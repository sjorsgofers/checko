<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, initial-scale=1" />
  <title>Zusje Roermond Dashboard</title>
  <style>
    :root{
      --bg:#000;
      --panel:#050505;
      --line:#161616;
      --text:#fff;
      --muted:#8d8d8d;
      --soft:#cfcfcf;
      --ok:#ffffff;
      --pending:#5f5f5f;
      --warn:#cfcfcf;
      --danger:#ffffff;
    }

    *{ box-sizing:border-box; }

    html, body {
      width:100%;
      height:100%;
      margin:0;
      background:#000;
      color:#fff;
      overflow:hidden;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }

    #dashboard-shell{
      position:fixed;
      inset:0;
      background:var(--bg);
      overflow:hidden;
    }

    .stage{
      position:relative;
      width:100%;
      height:100%;
    }

    .frame{
      position:absolute;
      left:50%;
      top:50%;
      width:1920px;
      height:1080px;
      transform:translate(-50%,-50%) scale(1);
      transform-origin:center center;
      will-change:transform;
    }

    .wrap{
      width:100%;
      height:100%;
      padding:34px 42px 38px;
      display:flex;
      flex-direction:column;
      gap:24px;
      background:#000;
    }

    /* TOP */
    .top{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      min-height:190px;
    }

    .leftMeta{
      justify-self:start;
      align-self:center;
    }

    .brand{
      font-size:26px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#d4d4d4;
      margin-bottom:10px;
    }

    .submeta{
      font-size:22px;
      font-weight:600;
      color:var(--muted);
    }

    .clockWrap{
      justify-self:center;
      text-align:center;
      transform:translateY(-4px);
    }

    .clock{
      font-size:150px;
      line-height:.9;
      font-weight:900;
      letter-spacing:-0.06em;
      font-variant-numeric:tabular-nums;
      color:#fff;
    }

    .date{
      margin-top:10px;
      font-size:30px;
      line-height:1.1;
      font-weight:700;
      color:#d4d4d4;
      text-transform:capitalize;
    }

    .rightMeta{
      justify-self:end;
      align-self:center;
      text-align:right;
      font-size:22px;
      font-weight:600;
      color:var(--muted);
    }

    /* MAIN */
    .main{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns: 420px 1fr 420px;
      gap:28px;
      align-items:stretch;
    }

    .sideCard,
    .centerCard{
      border:1px solid var(--line);
      border-radius:30px;
      background:linear-gradient(180deg,#050505 0%, #020202 100%);
      box-shadow:0 20px 50px rgba(0,0,0,.4);
      min-height:0;
    }

    .sideCard{
      padding:26px 22px 22px;
      display:flex;
      flex-direction:column;
    }

    .centerCard{
      padding:24px;
      display:flex;
      flex-direction:column;
    }

    .cardTitle{
      font-size:32px;
      font-weight:900;
      letter-spacing:.01em;
      color:#fff;
      margin-bottom:18px;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:12px;
      min-height:0;
      overflow:auto;
      padding-right:4px;
    }

    .list::-webkit-scrollbar{
      width:8px;
    }

    .list::-webkit-scrollbar-thumb{
      background:#1f1f1f;
      border-radius:999px;
    }

    .checkItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      min-height:76px;
      padding:16px 16px;
      border:1px solid #151515;
      border-radius:18px;
      background:#070707;
    }

    .checkLeft{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
      flex:1;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:999px;
      background:#5f5f5f;
      flex:0 0 auto;
    }

    .dot.ok{
      background:#fff;
      box-shadow:0 0 0 2px rgba(255,255,255,.08);
    }

    .dot.pending{
      background:#525252;
    }

    .checkName{
      font-size:28px;
      line-height:1.1;
      font-weight:800;
      color:#fff;
      letter-spacing:.01em;
    }

    .checkStatus{
      flex:0 0 auto;
      font-size:16px;
      font-weight:800;
      color:#d4d4d4;
      border:1px solid #232323;
      border-radius:999px;
      padding:8px 12px;
      white-space:nowrap;
      background:#0b0b0b;
    }

    .checkStatus.ok{
      color:#fff;
      border-color:#3a3a3a;
      background:#111;
    }

    .checkStatus.pending{
      color:#8f8f8f;
      border-color:#1d1d1d;
      background:#080808;
    }

    /* CENTER ACTIONS */
    .actions{
      display:flex;
      flex-direction:column;
      gap:16px;
      min-height:0;
      overflow:auto;
      justify-content:center;
    }

    .actions::-webkit-scrollbar{
      width:8px;
    }

    .actions::-webkit-scrollbar-thumb{
      background:#1f1f1f;
      border-radius:999px;
    }

    .action{
      display:flex;
      align-items:center;
      gap:18px;
      min-height:96px;
      padding:20px 24px;
      border-radius:24px;
      border:1px solid #141414;
      background:#050505;
    }

    .action .dot{
      width:14px;
      height:14px;
      background:#fff;
      opacity:.9;
    }

    .action.pendingDot .dot{
      background:#5e5e5e;
    }

    .action.warnDot .dot{
      background:#cfcfcf;
    }

    .action.dangerDot .dot{
      background:#fff;
      box-shadow:0 0 0 2px rgba(255,255,255,.08);
    }

    .actionText{
      font-size:40px;
      line-height:1.08;
      font-weight:900;
      letter-spacing:-0.02em;
      color:#fff;
    }

    .empty{
      font-size:34px;
      font-weight:700;
      color:var(--muted);
      padding:10px 4px;
    }

    .footerNote{
      text-align:center;
      font-size:18px;
      font-weight:600;
      color:#6f6f6f;
      margin-top:2px;
    }
  </style>
</head>
<body>
  <div id="dashboard-shell">
    <div class="stage">
      <div class="frame" id="zd-frame">
        <div class="wrap">

          <div class="top">
            <div class="leftMeta">
              <div class="brand">Zusje Roermond</div>
              <div class="submeta">Dashboard • Horecadag t/m 04:00</div>
            </div>

            <div class="clockWrap">
              <div class="clock" id="zd-clock">--:--</div>
              <div class="date" id="zd-date">—</div>
            </div>

            <div class="rightMeta">
              Alleen taken en statussen van vandaag
            </div>
          </div>

          <div class="main">
            <section class="sideCard">
              <div class="cardTitle">Bediening</div>
              <div class="list" id="zd-serviceChecklists"></div>
            </section>

            <section class="centerCard">
              <div class="actions" id="zd-actionsList"></div>
            </section>

            <section class="sideCard">
              <div class="cardTitle">Keuken</div>
              <div class="list" id="zd-kitchenChecklists"></div>
            </section>
          </div>

          <div class="footerNote">Druk op F voor fullscreen</div>

        </div>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const CONFIG = {
      sheets:{
        checklistsJson:"https://script.google.com/macros/s/AKfycbw_Tn0z0s3AJ7CARzHt9sFy8CGhrCe_HzS9ao0KKDtgzq9TR_H-28WBss316I6PDcr7/exec",
        periodicJson:"https://script.google.com/macros/s/AKfycbxEDSHzBOrrYqkNOCQI6clM6DNuoge55tdATn1XNC63HT7GgPcsZF5AT3dwfaLjEUmV/exec",
        containersJson:"https://script.google.com/macros/s/AKfycbwPQ1WsRqrJmRuYD8bL6kz5H5sSDNcBsIa0z-WW4hain7fkVhM6HIUQI3DHyhpn-C1zHQ/exec"
      },
      refreshMs:15000
    };

    const EMBALLAGE_SCHEDULE = {
      0: ["Bidfood emballage klaarzetten"],
      3: ["Bidfood emballage klaarzetten"],
      5: ["Bidfood emballage klaarzetten"]
    };

    const FALLBACK_CONTAINERS = {
      0: ["Restafval containers klaarzetten"],
      1: ["Glas containers klaarzetten"],
      2: ["Restafval containers klaarzetten"],
      3: [],
      4: ["Papier container klaarzetten"],
      5: [],
      6: []
    };

    const THURSDAY_PLASTIC_LABEL = "Plastic containers klaarzetten";
    const YELLOW_CRATES_START = "2025-11-17";

    const state = {
      checklists: [],
      periodicTasks: [],
      ordersRules: [
        {vendor:"Bidfood",weekdays:[2],deadline:"00:00"},
        {vendor:"Bubbels",weekdays:[3],deadline:"23:00",evenWeeks:true},
        {vendor:"Zusje Kantoor",weekdays:[3],deadline:"23:00",evenWeeks:true},
        {vendor:"Bidfood",weekdays:[4],deadline:"00:00"},
        {vendor:"Bidfood",weekdays:[6],deadline:"00:00"}
      ]
    };

    let containersData = null;

    const $ = sel => document.querySelector(sel);
    const pad = n => String(n).padStart(2,"0");

    const getOpsDate = (d)=>{
      const x = new Date(d || Date.now());
      if (x.getHours() < 4) x.setDate(x.getDate() - 1);
      return x;
    };

    const fmtDutchDate = d => d.toLocaleDateString("nl-NL",{
      weekday:"long",
      day:"2-digit",
      month:"long"
    });

    const weekNumber = d=>{
      const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dn = (t.getUTCDay()+6)%7;
      t.setUTCDate(t.getUTCDate()-dn+3);
      const fT = new Date(Date.UTC(t.getUTCFullYear(),0,4));
      return 1 + Math.round(((t-fT)/86400000 - 3 + ((fT.getUTCDay()+6)%7))/7);
    };

    const isEvenWeek = d => weekNumber(d)%2===0;

    const opsDateStrToday = ()=>{
      const d = getOpsDate(new Date());
      return d.toISOString().slice(0,10);
    };

    const ymdInAmsterdam = (dateLike)=>{
      const tz = "Europe/Amsterdam";
      if(!dateLike) return null;

      if(typeof dateLike === "string" && /^\d{4}-\d{2}-\d{2}/.test(dateLike)){
        return dateLike.slice(0,10);
      }

      const d = new Date(dateLike);
      if(isNaN(d)) return null;

      const parts = new Intl.DateTimeFormat("nl-NL",{
        timeZone: tz,
        year:"numeric",
        month:"2-digit",
        day:"2-digit"
      }).formatToParts(d);

      let y,m,da;
      for(const p of parts){
        if(p.type==="year") y=p.value;
        else if(p.type==="month") m=p.value;
        else if(p.type==="day") da=p.value;
      }

      return (y && m && da) ? `${y}-${m}-${da}` : null;
    };

    function normalizeText(str){
      return String(str || "")
        .toLowerCase()
        .replace(/\s+/g," ")
        .trim();
    }

    function classifyChecklist(name){
      const n = normalizeText(name);

      if (
        n.includes("keuken") ||
        n.includes("spoel") ||
        n.includes("bar") ||
        n.includes("kok") ||
        n.includes("sluit keuken") ||
        n.includes("sluitlijst keuken") ||
        n.includes("sluitlijst spoel")
      ){
        return "kitchen";
      }

      if (
        n.includes("open") ||
        n.includes("bediening onder") ||
        n.includes("beneden") ||
        n.includes("bediening boven") ||
        n.includes("boven") ||
        n.includes("run")
      ){
        return "service";
      }

      return "service";
    }

    function displayChecklistName(name){
      const n = normalizeText(name);

      if (n.includes("open")) return "Openen";
      if (n.includes("bediening onder")) return "Bediening onder";
      if (n.includes("bediening boven")) return "Bediening boven";
      if (n === "beneden" || n.includes("sluitlijst beneden")) return "Bediening onder";
      if (n === "boven" || n.includes("sluitlijst boven")) return "Bediening boven";
      if (n.includes("run")) return "Run";
      if (n.includes("sluitlijst keuken")) return "Sluitlijst keuken";
      if (n.includes("sluit keuken")) return "Sluitlijst keuken";
      if (n.includes("sluitlijst spoel")) return "Sluitlijst spoel";
      if (n.includes("spoel")) return "Spoelkeuken";
      if (n.includes("keuken")) return "Keuken";
      if (n.includes("bar beneden")) return "Bar beneden";
      if (n.includes("bar boven")) return "Bar boven";

      return name;
    }

    async function fetchChecklists(){
      try{
        const r = await fetch(CONFIG.sheets.checklistsJson,{cache:"no-store"});
        if(r.ok){
          const j = await r.json();
          if(Array.isArray(j.items)){
            state.checklists = j.items
              .map(it=>({
                name:String(it.name || "").trim(),
                done:!!it.done
              }))
              .filter(x=>x.name);
          }
        }
      }catch(e){
        console.warn("Checklist fetch fail", e);
      }
    }

    async function fetchPeriodic(){
      try{
        const u = CONFIG.sheets.periodicJson;
        const sep = u.includes("?") ? "&" : "?";
        const r = await fetch(u + sep + "tz=Europe/Amsterdam",{cache:"no-store"});
        if(r.ok){
          const j = await r.json();
          let items = (j && j.ok && Array.isArray(j.items)) ? j.items : [];
          const todayStr = opsDateStrToday();

          items = items.filter(ev=>{
            const s = ev.start || ev.startTime || ev.date || ev.dateISO;
            if(!s) return true;
            const evStr = ymdInAmsterdam(s);
            if(!evStr) return false;
            return evStr === todayStr;
          });

          state.periodicTasks = items.map(ev=>({
            title: ev.title,
            allDay: !!ev.allDay,
            start: ev.start || ev.startTime || ev.date || ev.dateISO || null
          }));
        }
      }catch(e){
        console.warn("Periodic fail", e);
      }
    }

    async function fetchContainers(){
      const url = CONFIG.sheets.containersJson;
      if(!url) return null;
      try{
        const sep = url.includes("?") ? "&" : "?";
        const r = await fetch(url + sep + "tz=Europe/Amsterdam",{cache:"no-store"});
        if(!r.ok) throw new Error("HTTP " + r.status);
        return await r.json();
      }catch(e){
        console.warn("Containers endpoint faalde:", e);
        return null;
      }
    }

    async function loadAll(){
      const [a,b,c] = await Promise.allSettled([
        fetchChecklists(),
        fetchPeriodic(),
        fetchContainers()
      ]);
      containersData = (c && c.status==="fulfilled") ? c.value : null;
      renderAll();
    }

    function renderHeader(){
      const now = new Date();
      const ops = getOpsDate(now);
      $("#zd-clock").textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      $("#zd-date").textContent = fmtDutchDate(ops);
    }

    function renderChecklistGroup(targetId, items){
      const wrap = document.getElementById(targetId);
      wrap.innerHTML = "";

      if(!items.length){
        wrap.innerHTML = `
          <div class="checkItem">
            <div class="checkLeft">
              <span class="dot pending"></span>
              <div class="checkName">Geen checklists</div>
            </div>
          </div>
        `;
        return;
      }

      items.forEach(c=>{
        const el = document.createElement("div");
        el.className = "checkItem";
        el.innerHTML = `
          <div class="checkLeft">
            <span class="dot ${c.done ? "ok" : "pending"}"></span>
            <div class="checkName">${displayChecklistName(c.name)}</div>
          </div>
          <div class="checkStatus ${c.done ? "ok" : "pending"}">
            ${c.done ? "Ingediend" : "Open"}
          </div>
        `;
        wrap.appendChild(el);
      });
    }

    function renderChecklists(){
      const service = [];
      const kitchen = [];

      state.checklists.forEach(c=>{
        const type = classifyChecklist(c.name);
        if(type === "kitchen") kitchen.push(c);
        else service.push(c);
      });

      const preferredServiceOrder = ["Openen","Bediening onder","Bediening boven","Run"];
      service.sort((a,b)=>{
        const aa = preferredServiceOrder.indexOf(displayChecklistName(a.name));
        const bb = preferredServiceOrder.indexOf(displayChecklistName(b.name));
        return (aa === -1 ? 999 : aa) - (bb === -1 ? 999 : bb);
      });

      renderChecklistGroup("zd-serviceChecklists", service);
      renderChecklistGroup("zd-kitchenChecklists", kitchen);
    }

    function isYellowCratesDay(ops){
      const start = new Date(YELLOW_CRATES_START + "T00:00:00");
      const msPerDay = 24*60*60*1000;
      const opsMid = new Date(ops);
      opsMid.setHours(0,0,0,0);
      const daysDiff = Math.floor((opsMid - start.getTime()) / msPerDay);
      if(daysDiff < 0) return false;
      const weeksDiff = Math.floor(daysDiff / 7);
      return weeksDiff % 2 === 0;
    }

    function buildActions(){
      const actions = [];
      const now = new Date();
      const ops = getOpsDate(now);
      const dow = ops.getDay();
      const even = isEvenWeek(ops);
      const todayStr = opsDateStrToday();

      let containers = [];
      if (containersData) {
        if (Array.isArray(containersData.items)) {
          containers = containersData.items
            .filter(it=>{
              const s = it.start || it.startTime || it.date || it.dateISO;
              if(!s) return true;
              const evStr = ymdInAmsterdam(s);
              if(!evStr) return false;
              return evStr === todayStr;
            })
            .map(it=> String(it.title || it.name || "").trim())
            .filter(Boolean);
        } else if (Array.isArray(containersData.containers)) {
          containers = containersData.containers.slice();
        }
      }

      if (containers.length === 0) {
        containers = FALLBACK_CONTAINERS[dow] ? [...FALLBACK_CONTAINERS[dow]] : [];
        if (dow === 4 && even) {
          if(!containers.includes(THURSDAY_PLASTIC_LABEL)) containers.push(THURSDAY_PLASTIC_LABEL);
        }
      }

      containers.forEach(x=>{
        actions.push({
          label:x,
          tone:"normal"
        });
      });

      const emballage = EMBALLAGE_SCHEDULE[dow] ? [...EMBALLAGE_SCHEDULE[dow]] : [];
      if(dow === 1 && isYellowCratesDay(ops)){
        emballage.push("Gele Zusje kratten klaarzetten");
      }

      emballage.forEach(x=>{
        actions.push({
          label:x,
          tone:"normal"
        });
      });

      const todayOrders = state.ordersRules.filter(r =>
        (r.weekdays || []).includes(dow) && (!r.evenWeeks || even)
      );

      if(todayOrders.length){
        todayOrders.forEach(r=>{
          let limit = new Date(ops);

          if(r.deadline === "00:00"){
            limit.setDate(limit.getDate()+1);
            limit.setHours(0,0,0,0);
          }else{
            const [h,m] = (r.deadline || "23:59").split(":").map(Number);
            limit.setHours(h, m || 0, 0, 0);
          }

          const diff = Math.round((limit - now) / 60000);

          if(diff < 0){
            actions.push({
              label:`${r.vendor} bestellen — te laat`,
              tone:"danger"
            });
          }else if(diff <= 60){
            actions.push({
              label:`${r.vendor} bestellen — binnen ${diff} min`,
              tone:"warn"
            });
          }else{
            actions.push({
              label:`${r.vendor} bestellen`,
              tone:"normal"
            });
          }
        });
      } else {
        actions.push({
          label:"Geen bestellingen",
          tone:"pending"
        });
      }

      const periodic = state.periodicTasks || [];
      periodic.forEach(x=>{
        actions.push({
          label:x.title,
          tone:"normal"
        });
      });

      return actions;
    }

    function renderActions(){
      const wrap = $("#zd-actionsList");
      wrap.innerHTML = "";

      const actions = buildActions();

      if(!actions.length){
        wrap.innerHTML = `<div class="empty">Geen acties voor vandaag</div>`;
        return;
      }

      actions.forEach(a=>{
        const el = document.createElement("div");

        let cls = "action";
        if(a.tone === "pending") cls += " pendingDot";
        else if(a.tone === "warn") cls += " warnDot";
        else if(a.tone === "danger") cls += " dangerDot";

        el.className = cls;
        el.innerHTML = `
          <span class="dot"></span>
          <div class="actionText">${a.label}</div>
        `;
        wrap.appendChild(el);
      });
    }

    function renderAll(){
      renderHeader();
      renderChecklists();
      renderActions();
      fitFrame();
    }

    const FRAME_W = 1920;
    const FRAME_H = 1080;
    const SAFE_MARGIN_PX = 8;

    function fitFrame(){
      const shell = document.getElementById("dashboard-shell");
      const frame = document.getElementById("zd-frame");

      const viewW = Math.max(1, window.innerWidth || shell.clientWidth || document.documentElement.clientWidth);
      const viewH = Math.max(1, window.innerHeight || shell.clientHeight || document.documentElement.clientHeight);

      const base = Math.min(
        (viewW - SAFE_MARGIN_PX) / FRAME_W,
        (viewH - SAFE_MARGIN_PX) / FRAME_H
      );

      const scale = base * 0.99;
      frame.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    async function toggleFS(){
      try{
        if(document.fullscreenElement){
          await document.exitFullscreen();
        }else{
          const el = document.getElementById("dashboard-shell");
          if(el.requestFullscreen) await el.requestFullscreen();
          else if(document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
        }
      }catch(_){}
    }

    document.addEventListener("keydown", (e)=>{
      if((e.key || "").toLowerCase() === "f") toggleFS();
    });

    window.addEventListener("resize", fitFrame);
    window.addEventListener("orientationchange", fitFrame);
    document.addEventListener("fullscreenchange", fitFrame);
    document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) fitFrame(); });

    if(document.fonts && document.fonts.ready){
      document.fonts.ready.finally(fitFrame);
    }

    fitFrame();
    renderHeader();
    loadAll();

    setInterval(()=>{ renderHeader(); fitFrame(); },1000);
    setInterval(()=>{ loadAll(); }, CONFIG.refreshMs);
  })();
  </script>
</body>
</html>
