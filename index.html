<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Tafeloverzicht</title>

<style>
  :root{
    --bg:#0a0a0a;
    --bg-2:#0f0f0f;
    --card:#141414;
    --card-2:#1a1a1a;
    --card-3:#202020;
    --text:#ffffff;
    --muted:#9a9a9a;
    --muted-2:#5a5a5a;

    --nieuw:#ef4444;
    --nieuw-2:#b91c1c;
    --drank:#f59e0b;
    --drank-2:#b45309;
    --run:#10b981;
    --run-2:#047857;
    --koffie:#8b5cf6;
    --koffie-2:#6d28d9;
    --rekening:#0ea5e9;
    --rekening-2:#0369a1;

    --gold:#c8a45b;
    --gold-dim:#8a7140;
    --border-idle:#2a2a2a;

    --gap:10px;
    --tile:86px;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%; overscroll-behavior:none}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1a1a1a 0%, transparent 60%),
      var(--bg);
    color:var(--text);
    font:16px/1.35 -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    letter-spacing:-0.01em;
  }

  /* ===== Header ===== */
  header{
    background:linear-gradient(180deg, rgba(24,24,24,.95) 0%, rgba(12,12,12,.85) 100%);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(200,164,91,.25);
    padding:8px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    flex:0 0 auto;
  }

  .title{
    font-weight:800;
    font-size:clamp(14px, 2.2vw, 18px);
    flex:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    letter-spacing:.02em;
    background:linear-gradient(180deg, #fff 0%, #c8a45b 120%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  main{
    flex:1 1 auto;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:8px;
    padding:8px 12px 12px;
  }

  /* ===== Toolbar ===== */
  .toolbar{
    display:flex;
    gap:6px;
    flex-wrap:nowrap;
    align-items:center;
    flex:0 0 auto;
    overflow-x:auto;
  }

  .btn{
    appearance:none;
    background:linear-gradient(180deg, #1e1e1e 0%, #141414 100%);
    border:1px solid #2f2f2f;
    color:var(--text);
    padding:8px 12px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
    font-size:clamp(12px, 1.8vw, 13px);
    white-space:nowrap;
    transition:transform .1s, background .15s, border-color .15s;
    box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 2px 8px rgba(0,0,0,.25);
  }

  .btn:active{ transform:scale(.96) }

  .btn.gold{
    border:1px solid var(--gold);
    color:var(--gold);
    background:linear-gradient(180deg, rgba(200,164,91,.08) 0%, rgba(200,164,91,.02) 100%);
    letter-spacing:.5px;
  }

  .btn.focus-on{
    background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
    color:#0b0b0b;
    border-color:var(--gold);
  }

  /* ===== Status counter bar ===== */
  .status-bar{
    display:flex;
    gap:6px;
    flex:0 0 auto;
    overflow-x:auto;
    padding:2px 0;
  }

  .pill{
    appearance:none;
    background:linear-gradient(180deg, #161616 0%, #0f0f0f 100%);
    border:1px solid #262626;
    color:var(--muted);
    padding:7px 10px;
    border-radius:999px;
    font-weight:800;
    cursor:pointer;
    font-size:clamp(11px, 1.6vw, 13px);
    display:inline-flex;
    align-items:center;
    gap:7px;
    white-space:nowrap;
    flex:0 0 auto;
    transition:all .15s;
    letter-spacing:.01em;
  }

  .pill .dot{
    width:10px; height:10px; border-radius:50%;
    box-shadow:0 0 8px currentColor;
  }
  .pill .dot.nieuw{ background:var(--nieuw); color:var(--nieuw); }
  .pill .dot.drank{ background:var(--drank); color:var(--drank); }
  .pill .dot.run{ background:var(--run); color:var(--run); }
  .pill .dot.koffie{ background:var(--koffie); color:var(--koffie); }
  .pill .dot.rekening{ background:var(--rekening); color:var(--rekening); }

  .pill .cnt{
    font-variant-numeric:tabular-nums;
    color:#fff;
    min-width:1ch;
  }

  .pill[data-active="true"]{
    color:#fff;
    border-color:var(--gold);
    background:linear-gradient(180deg, rgba(200,164,91,.18) 0%, rgba(200,164,91,.06) 100%);
  }

  .pill[data-zero="true"]{
    opacity:.45;
  }

  /* ===== Groups ===== */
  .groups{
    flex:1 1 auto;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:8px;
    overflow:hidden;
  }

  .group{
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:5px;
  }

  .group-label{
    flex:0 0 auto;
    background:linear-gradient(180deg, rgba(200,164,91,.08) 0%, rgba(200,164,91,.02) 100%);
    border:1px solid rgba(200,164,91,.3);
    border-radius:8px;
    padding:4px 10px;
    font-weight:900;
    letter-spacing:.06em;
    font-size:clamp(11px, 1.6vw, 13px);
    line-height:1.1;
    color:var(--gold);
    text-transform:uppercase;
  }

  .group-grid{
    --cols: 6;
    display:grid;
    grid-template-columns:repeat(var(--cols), var(--tile));
    grid-auto-rows:var(--tile);
    gap:var(--gap);
    justify-content:center;
    align-content:start;
    flex:1 1 auto;
    min-height:0;
    overflow:hidden;
  }

  /* ===== Tile ===== */
  .table{
    width:var(--tile);
    height:var(--tile);
    border-radius:14px;
    background:linear-gradient(180deg, #181818 0%, #0f0f0f 100%);
    border:1px solid var(--border-idle);
    display:grid;
    grid-template-rows:auto 1fr auto;
    align-items:center;
    justify-items:center;
    padding:7px;
    gap:4px;
    position:relative;
    user-select:none;
    cursor:pointer;
    transition:opacity .25s ease, transform .08s ease, filter .25s ease;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.03),
      0 1px 2px rgba(0,0,0,.4);
    overflow:hidden;
  }

  .table:active{ transform:scale(.96) }

  /* idle tile (geen status) — zachter wanneer niks speelt */
  .table:not([data-status]){
    opacity:.42;
  }
  .table:not([data-status]).num-flagged-only{
    opacity:.72;
    border-color:rgba(239,68,68,.35);
  }

  /* Focus mode: idle nog verder dimmen */
  body.focus-on .table:not([data-status]){
    opacity:.16;
  }
  body.focus-on .table:not([data-status]).num-flagged-only{
    opacity:.32;
  }

  /* Filter mode: niet-matchende tegels dimmen */
  body.has-filter .table[data-status]:not(.filter-match){
    opacity:.25;
    filter:saturate(.5);
  }
  body.has-filter .table:not([data-status]){
    opacity:.12;
  }

  /* Getal */
  .num{
    font-weight:900;
    font-size:calc(var(--tile) * 0.26);
    line-height:1;
    color:#fff;
    font-variant-numeric:tabular-nums;
    letter-spacing:-0.02em;
    text-shadow:0 1px 2px rgba(0,0,0,.4);
  }

  .num.num-flagged{ color: var(--nieuw); }

  .note{
    font-weight:600;
    font-size:calc(var(--tile) * 0.135);
    text-align:center;
    line-height:1.15;
    max-width:100%;
    max-height:2.4em;
    overflow:hidden;
    text-overflow:ellipsis;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    color:rgba(255,255,255,.9);
    letter-spacing:.01em;
  }

  .timer{
    position:absolute;
    bottom:5px;
    left:50%;
    transform:translateX(-50%);
    font-weight:800;
    font-size:calc(var(--tile) * 0.14);
    color:rgba(255,255,255,.95);
    pointer-events:none;
    font-family:"SF Mono","Menlo","Consolas",monospace;
    font-variant-numeric:tabular-nums;
    letter-spacing:-.02em;
    text-shadow:0 1px 2px rgba(0,0,0,.35);
  }

  /* Actieve statussen */
  .table[data-status]{
    color:#fff;
    border-color:transparent;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.18),
      inset 0 -20px 30px rgba(0,0,0,.25),
      0 4px 14px rgba(0,0,0,.35);
  }
  .table[data-status] .num{ color:#fff !important; text-shadow:0 1px 3px rgba(0,0,0,.35); }
  .table[data-status] .note{ color:#fff; }
  .table[data-status] .timer{ color:#fff; }

  .table.status-nieuw   { background:linear-gradient(160deg, #f87171 0%, var(--nieuw) 50%, var(--nieuw-2) 100%); }
  .table.status-drank   { background:linear-gradient(160deg, #fbbf24 0%, var(--drank) 50%, var(--drank-2) 100%); }
  .table.status-run     { background:linear-gradient(160deg, #34d399 0%, var(--run) 50%, var(--run-2) 100%); }
  .table.status-koffie  { background:linear-gradient(160deg, #a78bfa 0%, var(--koffie) 50%, var(--koffie-2) 100%); }
  .table.status-rekening{ background:linear-gradient(160deg, #38bdf8 0%, var(--rekening) 50%, var(--rekening-2) 100%); }

  /* Urgency escalatie */
  @keyframes pulseSoft{
    0%,100% { filter:brightness(1) saturate(1); }
    50%     { filter:brightness(1.18) saturate(1.1); }
  }
  @keyframes pulseHard{
    0%,100% { transform:scale(1);     box-shadow:
                inset 0 1px 0 rgba(255,255,255,.18),
                inset 0 -20px 30px rgba(0,0,0,.25),
                0 0 0 0 rgba(255,255,255,.55),
                0 4px 14px rgba(0,0,0,.35); }
    50%     { transform:scale(1.035); box-shadow:
                inset 0 1px 0 rgba(255,255,255,.22),
                inset 0 -20px 30px rgba(0,0,0,.2),
                0 0 0 8px rgba(255,255,255,0),
                0 8px 22px rgba(0,0,0,.45); }
  }

  .table.urgency-warn[data-status]{
    animation: pulseSoft 2.2s ease-in-out infinite;
  }
  .table.urgency-crit[data-status]{
    animation: pulseHard 1.3s ease-in-out infinite;
  }

  /* Next-up ring (langst wachtend per status) */
  .table.next-up[data-status]::after{
    content:"";
    position:absolute;
    inset:-1px;
    border-radius:inherit;
    border:2.5px solid rgba(255,255,255,.9);
    box-shadow:0 0 0 1px rgba(0,0,0,.4) inset;
    pointer-events:none;
    animation: nextGlow 2.4s ease-in-out infinite;
  }
  @keyframes nextGlow{
    0%,100% { opacity:.7; }
    50%     { opacity:1;   box-shadow:0 0 10px rgba(255,255,255,.45), 0 0 0 1px rgba(0,0,0,.4) inset; }
  }

  /* ===== Overlays ===== */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.78);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
    z-index:2147483647;
    animation: fadeIn .18s ease-out;
  }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }

  .overlay.open{ display:flex }

  .modal{
    width:100%;
    max-width:560px;
    background:linear-gradient(180deg, var(--card-2) 0%, var(--card) 100%);
    border:1px solid rgba(200,164,91,.35);
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.03) inset;
    overflow:hidden;
    animation: modalIn .22s cubic-bezier(.2,.7,.3,1);
  }
  @keyframes modalIn{
    from{ transform:translateY(10px) scale(.98); opacity:0 }
    to{ transform:translateY(0) scale(1); opacity:1 }
  }

  .modal-header{
    padding:14px 18px;
    font-weight:900;
    font-size:16px;
    border-bottom:1px solid rgba(200,164,91,.2);
    background:linear-gradient(180deg, #1d1d1d 0%, #141414 100%);
    color:var(--text);
    letter-spacing:.01em;
  }

  .modal-grid{
    padding:14px;
    display:grid;
    gap:10px;
    grid-template-columns:repeat(auto-fit, minmax(170px, 1fr));
    background:transparent;
  }

  .choice{
    border:1px solid #2f2f2f;
    background:linear-gradient(180deg, #1c1c1c 0%, #131313 100%);
    border-radius:12px;
    padding:14px;
    font-weight:800;
    font-size:15px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    color:var(--text);
    transition:transform .08s, border-color .15s, background .15s;
  }
  .choice:active{ transform:scale(.97) }

  .choice[data-choice="nieuw"]     { border-color:rgba(239,68,68,.45); }
  .choice[data-choice="drank"]     { border-color:rgba(245,158,11,.45); }
  .choice[data-choice="run"]       { border-color:rgba(16,185,129,.45); }
  .choice[data-choice="koffie"]    { border-color:rgba(139,92,246,.45); }
  .choice[data-choice="rekening"]  { border-color:rgba(14,165,233,.45); }

  .choice.reset{ border-color:var(--gold-dim); color:var(--gold); }

  .swatch{ width:16px; height:16px; border-radius:6px; box-shadow:0 0 10px currentColor; }
  .swatch.nieuw{background:var(--nieuw); color:var(--nieuw)}
  .swatch.drank{background:var(--drank); color:var(--drank)}
  .swatch.run{background:var(--run); color:var(--run)}
  .swatch.koffie{background:var(--koffie); color:var(--koffie)}
  .swatch.rekening{background:var(--rekening); color:var(--rekening)}

  .modal-footer{
    padding:12px 14px;
    border-top:1px solid rgba(200,164,91,.2);
    display:flex;
    gap:10px;
    justify-content:space-between;
    align-items:center;
    background:linear-gradient(180deg, #141414 0%, #0f0f0f 100%);
  }

  .link{
    border:1px solid #2f2f2f;
    background:linear-gradient(180deg, #1c1c1c 0%, #131313 100%);
    border-radius:11px;
    padding:10px 13px;
    font-weight:800;
    font-size:14px;
    cursor:pointer;
    color:var(--text);
    transition:transform .08s;
  }
  .link:active{ transform:scale(.96) }

  .link.primary{
    background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
    border-color:var(--gold);
    color:#0b0b0b;
  }

  .link.danger{
    border-color:rgba(239,68,68,.6);
    color:#f87171;
  }

  .note-editor{
    display:none;
    padding:14px;
    border-top:1px solid rgba(200,164,91,.2);
  }
  .note-editor.open{ display:block }

  .note-editor textarea{
    width:100%;
    min-height:96px;
    padding:12px;
    border:1px solid #2f2f2f;
    border-radius:12px;
    font:15px/1.4 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
    resize:vertical;
    background:#101010;
    color:var(--text);
  }
  .note-editor textarea::placeholder,
  .input-wrap input::placeholder{ color:var(--muted-2) }

  .note-actions{
    display:flex;
    gap:8px;
    justify-content:flex-end;
    margin-top:10px;
    flex-wrap:wrap;
  }

  .menu-header{ color:var(--gold); letter-spacing:.08em; text-transform:uppercase; font-size:14px; }

  .input-wrap{
    padding:14px;
    display:grid;
    gap:10px;
  }
  .input-wrap input{
    width:100%;
    padding:13px;
    border:1px solid #2f2f2f;
    border-radius:12px;
    font:16px/1.2 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
    background:#101010;
    color:var(--text);
  }
  .input-hint{ font-size:12px; color:var(--muted) }

  /* ===== Fullscreen broadcast ===== */
  .alert-screen{
    position:fixed;
    inset:0;
    background:
      radial-gradient(1200px 700px at 50% -20%, #2a1a08 0%, transparent 60%),
      #0b0b0b;
    color:#ffffff;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:2147483647;
    padding:24px;
    text-align:center;
    animation: alertIn .18s ease-out;
  }
  @keyframes alertIn{ from{opacity:0; transform:scale(.98)} to{opacity:1; transform:scale(1)} }
  .alert-screen.show{ display:flex }

  .alert-only{
    font-size:clamp(36px, 9vw, 96px);
    font-weight:900;
    line-height:1.08;
    white-space:pre-wrap;
    word-break:break-word;
    max-width:min(1000px, 94vw);
    color:var(--gold);
    letter-spacing:-.01em;
    animation: alertPulse 1.8s ease-in-out infinite;
    text-shadow:0 0 40px rgba(200,164,91,.3);
  }
  @keyframes alertPulse{
    0%,100% { filter:brightness(1) }
    50%     { filter:brightness(1.15) }
  }
</style>
</head>

<body>
<header>
  <div class="title">Tafeloverzicht</div>
</header>

<main>
  <div class="toolbar">
    <button class="btn" id="resetAll">Reset alles</button>
    <button class="btn" id="focusBtn">Focusmodus</button>
    <button class="btn gold" id="helpBtn">HELP</button>
    <button class="btn gold" id="textBtn">TEXT</button>
  </div>

  <div class="status-bar" id="statusBar">
    <button class="pill" data-filter="nieuw"><span class="dot nieuw"></span><span class="cnt" data-count="nieuw">0</span> nieuw</button>
    <button class="pill" data-filter="drank"><span class="dot drank"></span><span class="cnt" data-count="drank">0</span> drank</button>
    <button class="pill" data-filter="run"><span class="dot run"></span><span class="cnt" data-count="run">0</span> run</button>
    <button class="pill" data-filter="koffie"><span class="dot koffie"></span><span class="cnt" data-count="koffie">0</span> koffie</button>
    <button class="pill" data-filter="rekening"><span class="dot rekening"></span><span class="cnt" data-count="rekening">0</span> rekening</button>
  </div>

  <div class="groups" id="groups"></div>
</main>

<!-- Status / Notitie modal -->
<div id="overlay" class="overlay" aria-modal="true" role="dialog">
  <div class="modal">
    <div class="modal-header">Tafel <span id="modalTableNum"></span></div>

    <div class="modal-grid" id="statusChoices">
      <button class="choice" data-choice="nieuw"><span class="swatch nieuw"></span>Nieuw</button>
      <button class="choice" data-choice="drank"><span class="swatch drank"></span>Drank</button>
      <button class="choice" data-choice="run"><span class="swatch run"></span>Run</button>
      <button class="choice" data-choice="koffie"><span class="swatch koffie"></span>Koffie</button>
      <button class="choice" data-choice="rekening"><span class="swatch rekening"></span>Rekening</button>
      <button class="choice reset" data-choice="resetnum">Reset (rode cijfers)</button>
    </div>

    <div class="note-editor" id="noteEditor">
      <textarea id="noteInput" placeholder="Notitie voor deze tafel..."></textarea>
      <div class="note-actions">
        <button class="link danger" id="deleteNote">Verwijder notitie</button>
        <button class="link" id="cancelNote">Annuleren</button>
        <button class="link primary" id="saveNote">Opslaan</button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="link" id="cancelModal">Sluiten</button>
      <button class="link primary" id="openNote">Notitie toevoegen/bewerken</button>
    </div>
  </div>
</div>

<!-- HELP menu -->
<div id="helpOverlay" class="overlay" aria-modal="true" role="dialog">
  <div class="modal">
    <div class="modal-header menu-header">Kies hulplocatie</div>
    <div class="modal-grid">
      <button class="choice" data-broadcast="Bar Beneden">Bar Beneden</button>
      <button class="choice" data-broadcast="Bar Boven">Bar Boven</button>
      <button class="choice" data-broadcast="Run">Run</button>
      <button class="choice reset" id="helpCancel">Annuleren</button>
    </div>
  </div>
</div>

<!-- TEXT menu -->
<div id="textOverlay" class="overlay" aria-modal="true" role="dialog">
  <div class="modal">
    <div class="modal-header menu-header">Kies bericht</div>
    <div class="modal-grid">
      <button class="choice" data-text="Boven uithalen">Boven uithalen</button>
      <button class="choice" data-text="IJs brengen">IJs brengen</button>
      <button class="choice" id="openCustomText">Eigen invoer</button>
      <button class="choice reset" id="textCancel">Annuleren</button>
    </div>
  </div>
</div>

<!-- Eigen invoer -->
<div id="customTextOverlay" class="overlay" aria-modal="true" role="dialog">
  <div class="modal">
    <div class="modal-header">Eigen bericht</div>
    <div class="input-wrap">
      <input id="customTextInput" type="text" maxlength="80" placeholder="Typ een bericht (max 80 tekens)..." />
      <div class="input-hint">Wordt direct op alle apparaten getoond. Verdwijnt overal bij 1 tik op 1 scherm.</div>
    </div>
    <div class="modal-footer">
      <button class="link" id="customTextClose">Sluiten</button>
      <button class="link primary" id="customTextSend">Versturen</button>
    </div>
  </div>
</div>

<!-- Fullscreen broadcast -->

/* ===== Audio (tiny WebAudio beep) ===== */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  return audioCtx;
}
function beep({freq=880, dur=.14, type='sine', vol=.25, delay=0}={}){
  const ctx = ensureAudio();
  if(!ctx) return;
  const t0 = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  osc.connect(g).connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0+dur+0.02);
}
function soundBroadcast(){ beep({freq:880,dur:.12,vol:.28}); beep({freq:1320,dur:.12,vol:.22,delay:.14}); }
function soundUrgent(){ beep({freq:660,dur:.09,type:'triangle',vol:.18}); beep({freq:990,dur:.09,type:'triangle',vol:.14,delay:.11}); }
function haptic(ms=15){ if(navigator.vibrate) navigator.vibrate(ms); }

// unlock audio on first interaction
function unlockAudioOnce(){
  const c = ensureAudio();
  if(c && c.state === 'suspended') c.resume();
  document.removeEventListener('touchstart', unlockAudioOnce);
  document.removeEventListener('click', unlockAudioOnce);
}

/* ===== Data ===== */
async function fetchAll(){
  if(!sb) return;
  try{
    const { data, error } = await sb.from('tables_status').select('*');
    if(error){ console.error('fetchAll error', error); return; }
    rows = new Map((data||[]).map(r=>[keyOf(r.zone,r.table_num), r]));
  }catch(e){ console.error('fetchAll exception', e); }
}

async function upsertTable(zone, num, patch){
  const prev = rows.get(keyOf(zone,num)) || { zone, table_num:num };
  const payload = {
    status:null, status_started:null, note:null, num_marked:false,
    ...prev,
    ...patch,
    updated_at: new Date().toISOString()
  };
  // Optimistic local update zodat UI ook zonder netwerk werkt
  rows.set(keyOf(zone,num), payload);
  if(!sb) return payload;
  try{
    const { data, error } = await sb.from('tables_status').upsert(payload).select().single();
    if(error){ console.error('upsert error', error); return payload; }
    rows.set(keyOf(zone,num), data);
    return data;
  }catch(e){ console.error('upsert exception', e); return payload; }
}

/* ===== UI helpers ===== */
function applyStatus(cell, status){
  cell.classList.remove(...Object.values(STATUS_CLASSES));
  if(status){
    cell.classList.add(STATUS_CLASSES[status]);
    cell.setAttribute('data-status', status);
  } else {
    cell.removeAttribute('data-status');
    cell.classList.remove('urgency-warn','urgency-crit','next-up','filter-match');
  }
}
function setNote(cell, txt){ cell.querySelector('.note').textContent = txt || ''; }
function setTimer(cell, txt){ cell.querySelector('.timer').textContent = txt || ''; }
function setNumFlag(cell, flagged){
  cell.querySelector('.num').classList.toggle('num-flagged', !!flagged);
  // visuele aanwijzing in idle-staat
  if(!cell.hasAttribute('data-status')){
    cell.classList.toggle('num-flagged-only', !!flagged);
  } else {
    cell.classList.remove('num-flagged-only');
  }
}

function fmtElapsed(ms){
  const total = Math.max(0, Math.floor(ms/1000));
  const s = total % 60;
  const m = Math.floor(total/60) % 60;
  const h = Math.floor(total/3600);
  const pad = n => n<10 ? '0'+n : ''+n;
  return h ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
}

/* Dynamische gap */
function applyResponsiveGap(){
  const minSide = Math.min(window.innerWidth, window.innerHeight);
  let gap = Math.round(minSide / 95);
  gap = Math.max(5, Math.min(12, gap));
  document.documentElement.style.setProperty('--gap', gap + 'px');
}

/* Tiles maximaal uitsmeren */
function layoutToFit(){
  const gap = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap')) || 8;

  const avail = groupsEl.getBoundingClientRect();
  const availW = Math.floor(avail.width);
  const availH = Math.floor(avail.height);

  const labels = groupsEl.querySelectorAll('.group-label');
  let labelH = 0;
  labels.forEach(l=> labelH += Math.ceil(l.getBoundingClientRect().height));

  const betweenGroups = 8;
  const N_b = expandRanges(RANGES_BENEDEN).length;
  const N_t = expandRanges(RANGES_BOVEN).length;

  let best = null;

  for(let cb=1; cb<=N_b; cb++){
    const rb = Math.ceil(N_b / cb);
    const tileW_b = Math.floor((availW - (cb-1)*gap) / cb);

    for(let ct=1; ct<=N_t; ct++){
      const rt = Math.ceil(N_t / ct);
      const tileW_t = Math.floor((availW - (ct-1)*gap) / ct);

      const totalRows = rb + rt;
      const gapsV = (rb-1 + rt-1) * gap + betweenGroups;

      const tileH_limit = Math.floor((availH - labelH - gapsV) / totalRows);
      const tileW_limit = Math.min(tileW_b, tileW_t);
      const tile = Math.max(0, Math.min(tileH_limit, tileW_limit));

      if(!best || tile > best.tile){ best = { cb, ct, rb, rt, tile }; }
    }
  }

  if(!best || best.tile < 28){
    best = { cb:6, ct:10, rb:Math.ceil(N_b/6), rt:Math.ceil(N_t/10), tile:28 };
  }

  document.documentElement.style.setProperty('--tile', best.tile + 'px');

  document.querySelectorAll('.group-grid').forEach(grid=>{
    const zone = grid.dataset.zone;
    grid.style.setProperty('--cols', (zone === 'bt') ? best.cb : best.ct);
  });

  const benedenGroup = document.querySelector('.group[data-zone="bt"]');
  const bovenGroup   = document.querySelector('.group[data-zone="boven"]');
  if(benedenGroup) benedenGroup.style.flex = `${best.rb} 1 0%`;
  if(bovenGroup)   bovenGroup.style.flex   = `${best.rt} 1 0%`;
}

function render(){

      cell.dataset.zone = group.zone;

      cell.innerHTML = `

        <div class="timer"></div>
      `;

      applyStatus(cell, r.status || null);
      setNote(cell, r.note || '');
      setNumFlag(cell, !!r.num_marked);

      cell.addEventListener('click', async ()=>{
        const cur = rows.get(keyOf(group.zone,n)) || {};
        const hasStatus = !!cur.status || cell.hasAttribute('data-status');

        // 1 klik op gekleurde tafel = status wissen (num_marked blijft)
        if(hasStatus){
          haptic(12);
          const keepFlag = !!cur.num_marked;
          await upsertTable(group.zone, n, { status:null, status_started:null, num_marked: keepFlag });
          applyStatus(cell, null);
          setTimer(cell, '');
          setNumFlag(cell, keepFlag);
          refreshDerived();
          return;
        }

        haptic(10);
        pendingCell = cell;
        modalTableNum.textContent = n;
        noteInput.value = cur.note || '';
        showChoicesPane();
        overlay.classList.add('open');
      });

      grid.appendChild(cell);
    }
  }

  function tick(){
    const now = Date.now();
    document.querySelectorAll('.table').forEach(cell=>{
      const zone = cell.dataset.zone;
      const num = Number(cell.dataset.num);
      const r = rows.get(keyOf(zone,num));
      if(r && r.status && r.status_started){
        const ms = now - Date.parse(r.status_started);
        setTimer(cell, fmtElapsed(ms));
        updateUrgency(cell, r.status, Math.floor(ms/1000));
      } else {
        setTimer(cell, '');
      }
    });
    updateNextUp();
  }
  tick();
  timerInterval = setInterval(tick, 1000);

  applyResponsiveGap();
  layoutToFit();
  refreshDerived();
}

/* ===== Urgency ===== */
function updateUrgency(cell, status, elapsedSec){
  const thr = URGENCY[status];
  if(!thr){ cell.classList.remove('urgency-warn','urgency-crit'); return; }
  const [warn, crit] = thr;
  let level = 0;
  if(elapsedSec >= crit) level = 2;
  else if(elapsedSec >= warn) level = 1;

  cell.classList.toggle('urgency-warn', level===1);
  cell.classList.toggle('urgency-crit', level===2);

  // subtiele ding bij overgang naar critical
  const k = `${cell.dataset.zone}-${cell.dataset.num}`;
  const prev = prevUrgencyLevel.get(k) || 0;
  if(level === 2 && prev < 2){
    soundUrgent();
    haptic(30);
  }
  prevUrgencyLevel.set(k, level);
}

/* ===== Next-up: per status de langst wachtende krijgt een ring ===== */
function updateNextUp(){
  document.querySelectorAll('.table.next-up').forEach(c=> c.classList.remove('next-up'));

  const oldestPerStatus = {}; // status -> {key, started}
  for(const [k, r] of rows.entries()){
    if(!r.status || !r.status_started) continue;
    const t = Date.parse(r.status_started);
    if(!oldestPerStatus[r.status] || t < oldestPerStatus[r.status].started){
      oldestPerStatus[r.status] = { key:k, started:t, zone:r.zone, num:r.table_num };
    }
  }

  // Alleen ring tonen als er minstens 2 van die status zijn
  const countsByStatus = countsByStatusNow();
  for(const status in oldestPerStatus){
    if((countsByStatus[status]||0) < 2) continue;
    const o = oldestPerStatus[status];
    const cell = document.querySelector(`.table[data-zone="${o.zone}"][data-num="${o.num}"]`);
    if(cell) cell.classList.add('next-up');
  }
}

function countsByStatusNow(){
  const c = { nieuw:0, drank:0, run:0, koffie:0, rekening:0 };
  for(const r of rows.values()){
    if(r.status && c.hasOwnProperty(r.status)) c[r.status]++;
  }
  return c;
}

/* ===== Status counter bar ===== */
function updateStatusCounts(){
  const c = countsByStatusNow();
  statusBarEl.querySelectorAll('.pill').forEach(pill=>{
    const s = pill.dataset.filter;
    const val = c[s] || 0;
    pill.querySelector(`[data-count="${s}"]`).textContent = val;
    pill.setAttribute('data-zero', val === 0 ? 'true' : 'false');
    pill.setAttribute('data-active', activeFilter === s ? 'true' : 'false');
  });
}

/* Filter toepassen op cellen */
function applyFilterClasses(){
  document.body.classList.toggle('has-filter', !!activeFilter);
  document.querySelectorAll('.table').forEach(cell=>{
    const match = activeFilter && cell.getAttribute('data-status') === activeFilter;
    cell.classList.toggle('filter-match', !!match);
  });
}

function refreshDerived(){
  updateStatusCounts();
  applyFilterClasses();
  updateNextUp();
}

statusBarEl.addEventListener('click', (e)=>{
  const pill = e.target.closest('.pill');
  if(!pill) return;

  haptic(8);
  refreshDerived();
});

/* Reset */
async function fullResetAll(){
  for(const g of GROUPS){
    for(const n of expandRanges(g.ranges)){
      const r = rows.get(keyOf(g.zone,n));
      if(!r) continue;
      await upsertTable(g.zone, n, { status:null, status_started:null, num_marked:false });
    }
  }
  prevUrgencyLevel.clear();
  render();
}
resetAllBtn.addEventListener('click', fullResetAll);

/* Auto reset 02:00 */
async function autoDailyResetCheck(){
  const now = new Date();
  const hh = now.getHours(), mm = now.getMinutes();
  const todayKey = now.toISOString().slice(0,10);
  const last = localStorage.getItem('last_auto_reset');
  if(hh === 2 && mm < 5 && last !== todayKey){
    await fullResetAll();
    localStorage.setItem('last_auto_reset', todayKey);
  }
}
setInterval(autoDailyResetCheck, 60_000);

function hideBroadcastLocal(){

function showBroadcastLocal(message){

  alertScreenEl.classList.add('show');

async function clearBroadcastGlobal(){

}
async function sendBroadcast(message){

  try{
    const { error } = await sb.from('help_events').insert({ kind: msg });

  }catch(e){ console.error('broadcast send exception', e); }

/* Realtime */
function subscribeRealtimeTables(){
  if(!sb) return;
  if(tablesChannel) sb.removeChannel(tablesChannel);
  tablesChannel = sb.channel('tables_status:all')
    .on('postgres_changes', { event:'*', schema:'public', table:'tables_status' }, payload=>{
      const row = payload.new || payload.old;
      if(!row) return;
      rows.set(keyOf(row.zone,row.table_num), payload.new || row);

      const cell = document.querySelector(`.table[data-zone="${row.zone}"][data-num="${row.table_num}"]`);
      if(cell){
        const r = rows.get(keyOf(row.zone,row.table_num));
        applyStatus(cell, r.status || null);
        setNote(cell, r.note || '');
        setNumFlag(cell, !!r.num_marked);
        if(!(r && r.status && r.status_started)){
          setTimer(cell, '');
          prevUrgencyLevel.delete(keyOf(row.zone,row.table_num));
        }
      }
      refreshDerived();
    })
    .subscribe();
}

function subscribeBroadcasts(){
  if(!sb) return;
  if(eventsChannel) sb.removeChannel(eventsChannel);
  eventsChannel = sb.channel('help_events:all')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'help_events' }, payload=>{
      const row = payload?.new;
      const kind = row?.kind;
      if(!kind) return;
      if(kind === BROADCAST_CLEAR){ hideBroadcastLocal(); return; }
      showBroadcastLocal(kind);
    })
    .subscribe();
}

/* Resize */
let raf=null;
function scheduleLayout(){
  if(raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(()=>{
    raf=null;
    applyResponsiveGap();
    layoutToFit();
  });
}
window.addEventListener('resize', scheduleLayout);
window.addEventListener('orientationchange', ()=>setTimeout(()=>{ applyResponsiveGap(); layoutToFit(); }, 60));

  applyResponsiveGap();
  layoutToFit();

  // 2) Daarna data ophalen + realtime (best-effort)
  try{
    await fetchAll();
    render();                // hertekenen met data als die binnen is
    subscribeRealtimeTables();
    subscribeBroadcasts();
    autoDailyResetCheck();
  }catch(e){
    console.error('init network phase failed', e);
  }
  applyResponsiveGap();
  layoutToFit();
})();
</script>
</body>
</html>
