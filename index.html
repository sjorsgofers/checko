<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Tafeloverzicht</title>

<style>
  :root{
    --bg:#0a0a0a;
    --bg-2:#0f0f0f;
    --card:#141414;
    --card-2:#1a1a1a;
    --card-3:#202020;
    --text:#ffffff;
    --muted:#9a9a9a;
    --muted-2:#5a5a5a;

    --nieuw:#ef4444;
    --nieuw-2:#b91c1c;
    --drank:#f59e0b;
    --drank-2:#b45309;
    --run:#10b981;
    --run-2:#047857;
    --koffie:#8b5cf6;
    --koffie-2:#6d28d9;
    --rekening:#0ea5e9;
    --rekening-2:#0369a1;

    --gold:#c8a45b;
    --gold-dim:#8a7140;
    --border-idle:#2a2a2a;

    --gap:10px;
    --tile:86px;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%; overscroll-behavior:none}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1a1a1a 0%, transparent 60%),
      var(--bg);
    color:var(--text);
    font:16px/1.35 -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    letter-spacing:-0.01em;
  }

  /* ===== Header ===== */
  header{
    background:linear-gradient(180deg, rgba(24,24,24,.95) 0%, rgba(12,12,12,.85) 100%);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(200,164,91,.25);
    padding:8px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    flex:0 0 auto;
  }

  .title{
    font-weight:800;
    font-size:clamp(14px, 2.2vw, 18px);
    flex:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    letter-spacing:.02em;
    background:linear-gradient(180deg, #fff 0%, #c8a45b 120%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  main{
    flex:1 1 auto;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:8px;
    padding:8px 12px 12px;
  }

  /* ===== Toolbar ===== */
  .toolbar{
    display:flex;
    gap:6px;
    flex-wrap:nowrap;
    align-items:center;
    flex:0 0 auto;
    overflow-x:auto;
  }

  .btn{
    appearance:none;
    background:linear-gradient(180deg, #1e1e1e 0%, #141414 100%);
    border:1px solid #2f2f2f;
    color:var(--text);
    padding:8px 12px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
    font-size:clamp(12px, 1.8vw, 13px);
    white-space:nowrap;
    transition:transform .1s, background .15s, border-color .15s;
    box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 2px 8px rgba(0,0,0,.25);
  }

  .btn:active{ transform:scale(.96) }

  .btn.gold{
    border:1px solid var(--gold);
    color:var(--gold);
    background:linear-gradient(180deg, rgba(200,164,91,.08) 0%, rgba(200,164,91,.02) 100%);
    letter-spacing:.5px;
  }

  .btn.focus-on{
    background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
    color:#0b0b0b;
    border-color:var(--gold);
  }

  /* ===== Status counter bar ===== */
  .status-bar{
    display:flex;
    gap:6px;
    flex:0 0 auto;
    overflow-x:auto;
    padding:2px 0;
  }

  .pill{
    appearance:none;
    background:linear-gradient(180deg, #161616 0%, #0f0f0f 100%);
    border:1px solid #262626;
    color:var(--muted);
    padding:7px 10px;
    border-radius:999px;
    font-weight:800;
    cursor:pointer;
    font-size:clamp(11px, 1.6vw, 13px);
    display:inline-flex;
    align-items:center;
    gap:7px;
    white-space:nowrap;
    flex:0 0 auto;
    transition:all .15s;
    letter-spacing:.01em;
  }

  .pill .dot{
    width:10px; height:10px; border-radius:50%;
    box-shadow:0 0 8px currentColor;
  }
  .pill .dot.nieuw{ background:var(--nieuw); color:var(--nieuw); }
  .pill .dot.drank{ background:var(--drank); color:var(--drank); }
  .pill .dot.run{ background:var(--run); color:var(--run); }
  .pill .dot.koffie{ background:var(--koffie); color:var(--koffie); }
  .pill .dot.rekening{ background:var(--rekening); color:var(--rekening); }

  .pill .cnt{
    font-variant-numeric:tabular-nums;
    color:#fff;
    min-width:1ch;
  }

  .pill[data-active="true"]{
    color:#fff;
    border-color:var(--gold);
    background:linear-gradient(180deg, rgba(200,164,91,.18) 0%, rgba(200,164,91,.06) 100%);
  }

  .pill[data-zero="true"]{
    opacity:.45;
  }

  /* ===== Groups ===== */
  .groups{
    flex:1 1 auto;
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:8px;
    overflow:hidden;
  }

  .group{
    min-height:0;
    display:flex;
    flex-direction:column;
    gap:5px;
  }

  .group-label{
    flex:0 0 auto;
    background:linear-gradient(180deg, rgba(200,164,91,.08) 0%, rgba(200,164,91,.02) 100%);
    border:1px solid rgba(200,164,91,.3);
    border-radius:8px;
    padding:4px 10px;
    font-weight:900;
    letter-spacing:.06em;
    font-size:clamp(11px, 1.6vw, 13px);
    line-height:1.1;
    color:var(--gold);
    text-transform:uppercase;
  }

  .group-grid{
    --cols: 6;
    display:grid;
    grid-template-columns:repeat(var(--cols), var(--tile));
    grid-auto-rows:var(--tile);
    gap:var(--gap);
    justify-content:center;
    align-content:start;
    flex:1 1 auto;
    min-height:0;
    overflow:hidden;
  }

  /* ===== Tile ===== */
  .table{
    width:var(--tile);
    height:var(--tile);
    border-radius:14px;
    background:linear-gradient(180deg, #181818 0%, #0f0f0f 100%);
    border:1px solid var(--border-idle);
    display:grid;
    grid-template-rows:auto 1fr auto;
    align-items:center;
    justify-items:center;
    padding:7px;
    gap:4px;
    position:relative;
    user-select:none;
    cursor:pointer;
    transition:opacity .25s ease, transform .08s ease, filter .25s ease;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.03),
      0 1px 2px rgba(0,0,0,.4);
    overflow:hidden;
  }

  .table:active{ transform:scale(.96) }

  /* idle tile (geen status) — zachter wanneer niks speelt */
  .table:not([data-status]){
    opacity:.42;
  }
  .table:not([data-status]).num-flagged-only{
    opacity:.72;
    border-color:rgba(239,68,68,.35);
  }

  /* Focus mode: idle nog verder dimmen */
  body.focus-on .table:not([data-status]){
    opacity:.16;
  }
  body.focus-on .table:not([data-status]).num-flagged-only{
    opacity:.32;
  }

  /* Filter mode: niet-matchende tegels dimmen */
  body.has-filter .table[data-status]:not(.filter-match){
    opacity:.25;
    filter:saturate(.5);
  }
  body.has-filter .table:not([data-status]){
    opacity:.12;
  }

  /* Getal */
  .num{
    font-weight:900;
    font-size:calc(var(--tile) * 0.26);
    line-height:1;
    color:#fff;
    font-variant-numeric:tabular-nums;
    letter-spacing:-0.02em;
    text-shadow:0 1px 2px rgba(0,0,0,.4);
  }

  .num.num-flagged{ color: var(--nieuw); }

  .note{
    font-weight:600;
    font-size:calc(var(--tile) * 0.135);
    text-align:center;
    line-height:1.15;
    max-width:100%;
    max-height:2.4em;
    overflow:hidden;
    text-overflow:ellipsis;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    color:rgba(255,255,255,.9);
    letter-spacing:.01em;
  }

  .timer{
    position:absolute;
    bottom:5px;
    left:50%;
    transform:translateX(-50%);
    font-weight:800;
    font-size:calc(var(--tile) * 0.14);
    color:rgba(255,255,255,.95);
    pointer-events:none;
    font-family:"SF Mono","Menlo","Consolas",monospace;
    font-variant-numeric:tabular-nums;
    letter-spacing:-.02em;
    text-shadow:0 1px 2px rgba(0,0,0,.35);
  }

  /* Actieve statussen */
  .table[data-status]{
    color:#fff;
    border-color:transparent;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.18),
      inset 0 -20px 30px rgba(0,0,0,.25),
      0 4px 14px rgba(0,0,0,.35);
  }
  .table[data-status] .num{ color:#fff !important; text-shadow:0 1px 3px rgba(0,0,0,.35); }
  .table[data-status] .note{ color:#fff; }
  .table[data-status] .timer{ color:#fff; }

  .table.status-nieuw   { background:linear-gradient(160deg, #f87171 0%, var(--nieuw) 50%, var(--nieuw-2) 100%); }
  .table.status-drank   { background:linear-gradient(160deg, #fbbf24 0%, var(--drank) 50%, var(--drank-2) 100%); }
  .table.status-run     { background:linear-gradient(160deg, #34d399 0%, var(--run) 50%, var(--run-2) 100%); }
  .table.status-koffie  { background:linear-gradient(160deg, #a78bfa 0%, var(--koffie) 50%, var(--koffie-2) 100%); }
  .table.status-rekening{ background:linear-gradient(160deg, #38bdf8 0%, var(--rekening) 50%, var(--rekening-2) 100%); }

  /* Urgency escalatie */
  @keyframes pulseSoft{
    0%,100% { filter:brightness(1) saturate(1); }
    50%     { filter:brightness(1.18) saturate(1.1); }
  }
  @keyframes pulseHard{
    0%,100% { transform:scale(1);     box-shadow:
                inset 0 1px 0 rgba(255,255,255,.18),
                inset 0 -20px 30px rgba(0,0,0,.25),
                0 0 0 0 rgba(255,255,255,.55),
                0 4px 14px rgba(0,0,0,.35); }
    50%     { transform:scale(1.035); box-shadow:
                inset 0 1px 0 rgba(255,255,255,.22),
                inset 0 -20px 30px rgba(0,0,0,.2),
                0 0 0 8px rgba(255,255,255,0),
                0 8px 22px rgba(0,0,0,.45); }
  }

  .table.urgency-warn[data-status]{
    animation: pulseSoft 2.2s ease-in-out infinite;
  }
  .table.urgency-crit[data-status]{
    animation: pulseHard 1.3s ease-in-out infinite;
  }

  /* Next-up ring (langst wachtend per status) */
  .table.next-up[data-status]::after{
    content:"";
    position:absolute;
    inset:-1px;
    border-radius:inherit;
    border:2.5px solid rgba(255,255,255,.9);
    box-shadow:0 0 0 1px rgba(0,0,0,.4) inset;
    pointer-events:none;
    animation: nextGlow 2.4s ease-in-out infinite;
  }
  @keyframes nextGlow{
    0%,100% { opacity:.7; }
    50%     { opacity:1;   box-shadow:0 0 10px rgba(255,255,255,.45), 0 0 0 1px rgba(0,0,0,.4) inset; }
  }

  /* ===== Overlays ===== */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.78);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
    z-index:2147483647;
    animation: fadeIn .18s ease-out;
  }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }

  .overlay.open{ display:flex }

  .modal{
    width:100%;
    max-width:560px;
    background:linear-gradient(180deg, var(--card-2) 0%, var(--card) 100%);
    border:1px solid rgba(200,164,91,.35);
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.03) inset;
    overflow:hidden;
    animation: modalIn .22s cubic-bezier(.2,.7,.3,1);
  }
  @keyframes modalIn{
    from{ transform:translateY(10px) scale(.98); opacity:0 }
    to{ transform:translateY(0) scale(1); opacity:1 }
  }

  .modal-header{
    padding:14px 18px;
    font-weight:900;
    font-size:16px;
    border-bottom:1px solid rgba(200,164,91,.2);
    background:linear-gradient(180deg, #1d1d1d 0%, #141414 100%);
    color:var(--text);
    letter-spacing:.01em;
  }

  .modal-grid{
    padding:14px;
    display:grid;
    gap:10px;
    grid-template-columns:repeat(auto-fit, minmax(170px, 1fr));
    background:transparent;
  }

  .choice{
    border:1px solid #2f2f2f;
    background:linear-gradient(180deg, #1c1c1c 0%, #131313 100%);
    border-radius:12px;
    padding:14px;
    font-weight:800;
    font-size:15px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    color:var(--text);
    transition:transform .08s, border-color .15s, background .15s;
  }
  .choice:active{ transform:scale(.97) }

  .choice[data-choice="nieuw"]     { border-color:rgba(239,68,68,.45); }
  .choice[data-choice="drank"]     { border-color:rgba(245,158,11,.45); }
  .choice[data-choice="run"]       { border-color:rgba(16,185,129,.45); }
  .choice[data-choice="koffie"]    { border-color:rgba(139,92,246,.45); }
  .choice[data-choice="rekening"]  { border-color:rgba(14,165,233,.45); }

  .choice.reset{ border-color:var(--gold-dim); color:var(--gold); }

  .swatch{ width:16px; height:16px; border-radius:6px; box-shadow:0 0 10px currentColor; }
  .swatch.nieuw{background:var(--nieuw); color:var(--nieuw)}
  .swatch.drank{background:var(--drank); color:var(--drank)}
  .swatch.run{background:var(--run); color:var(--run)}
  .swatch.koffie{background:var(--koffie); color:var(--koffie)}
  .swatch.rekening{background:var(--rekening); color:var(--rekening)}

  .modal-footer{
    padding:12px 14px;
    border-top:1px solid rgba(200,164,91,.2);
    display:flex;
    gap:10px;
    justify-content:space-between;
    align-items:center;
    background:linear-gradient(180deg, #141414 0%, #0f0f0f 100%);
  }

  .link{
    border:1px solid #2f2f2f;
    background:linear-gradient(180deg, #1c1c1c 0%, #131313 100%);
    border-radius:11px;
    padding:10px 13px;
    font-weight:800;
    font-size:14px;
    cursor:pointer;
    color:var(--text);
    transition:transform .08s;
  }
  .link:active{ transform:scale(.96) }

  .link.primary{
    background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
    border-color:var(--gold);
    color:#0b0b0b;
  }

  .link.danger{
    border-color:rgba(239,68,68,.6);
    color:#f87171;
  }

  .note-editor{
    display:none;
    padding:14px;
    border-top:1px solid rgba(200,164,91,.2);
  }
  .note-editor.open{ display:block }

  .note-editor textarea{
    width:100%;
    min-height:96px;
    padding:12px;
    border:1px solid #2f2f2f;
    border-radius:12px;
    font:15px/1.4 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
    resize:vertical;
    background:#101010;
    color:var(--text);
  }
  .note-editor textarea::placeholder,
  .input-wrap input::placeholder{ color:var(--muted-2) }

  .note-actions{
    display:flex;
    gap:8px;
    justify-content:flex-end;
    margin-top:10px;
    flex-wrap:wrap;
  }

  .menu-header{ color:var(--gold); letter-spacing:.08em; text-transform:uppercase; font-size:14px; }

  .input-wrap{
    padding:14px;
    display:grid;
    gap:10px;
  }
  .input-wrap input{
    width:100%;
    padding:13px;
    border:1px solid #2f2f2f;
    border-radius:12px;
    font:16px/1.2 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
    background:#101010;
    color:var(--text);
  }
  .input-hint{ font-size:12px; color:var(--muted) }

  /* ===== View switcher ===== */
  .view-switch{
    display:flex;
    background:#0f0f0f;
    border:1px solid #262626;
    border-radius:999px;
    padding:3px;
    gap:2px;
  }
  .vs-btn{
    appearance:none;
    background:transparent;
    border:0;
    color:var(--muted);
    padding:7px 14px;
    font-weight:800;
    font-size:clamp(12px, 1.8vw, 14px);
    border-radius:999px;
    cursor:pointer;
    letter-spacing:.02em;
    transition:all .15s;
  }
  .vs-btn.active{
    background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
    color:#0b0b0b;
    box-shadow:0 2px 8px rgba(200,164,91,.3);
  }

  .view{ display:none; flex-direction:column; gap:8px; flex:1 1 auto; min-height:0; }
  .view.active{ display:flex; }

  /* ===== Reserveringen view ===== */
  .res-toolbar{
    display:flex;
    gap:8px;
    align-items:center;
    flex:0 0 auto;
    flex-wrap:wrap;
  }
  .res-toolbar .btn{ padding:9px 14px; font-size:15px; min-width:42px; }
  .res-spacer{ flex:1 1 auto; }

  .date-display{
    font-weight:900;
    font-size:clamp(14px, 2.2vw, 17px);
    color:var(--gold);
    letter-spacing:.02em;
    padding:0 6px;
    min-width:130px;
    text-align:center;
  }

  .res-section{
    display:flex;
    flex-direction:column;
    gap:5px;
    flex:0 0 auto;
    min-height:0;
  }
  .res-section.res-main{
    flex:1 1 auto;
    min-height:0;
    overflow:hidden;
  }
  .res-section.res-free{ flex:0 0 auto; }

  .res-section-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:4px 10px;
    background:linear-gradient(180deg, rgba(200,164,91,.08) 0%, rgba(200,164,91,.02) 100%);
    border:1px solid rgba(200,164,91,.3);
    border-radius:8px;
  }
  .res-section-title{
    font-weight:900;
    font-size:clamp(12px, 1.8vw, 14px);
    color:var(--gold);
    letter-spacing:.06em;
    text-transform:uppercase;
  }
  .res-section-sub{
    font-size:clamp(11px, 1.6vw, 13px);
    color:var(--muted);
    font-weight:700;
  }

  /* Vrije tafels — compact: alle nummers met capaciteit erachter */
  .free-groups{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    max-height:22vh;
    overflow-y:auto;
    padding:2px 2px 4px;
    align-content:flex-start;
  }
  .free-tile{
    appearance:none;
    display:inline-flex;
    align-items:baseline;
    gap:4px;
    padding:6px 9px;
    border:1.5px solid rgba(16,185,129,.45);
    background:linear-gradient(180deg, rgba(16,185,129,.14) 0%, rgba(16,185,129,.04) 100%);
    color:#fff;
    border-radius:9px;
    cursor:pointer;
    transition:transform .08s;
    line-height:1;
    font-variant-numeric:tabular-nums;
  }
  .free-tile:active{ transform:scale(.92); }
  .free-tile .tnum{
    font-weight:900;
    font-size:clamp(14px, 2vw, 16px);
    letter-spacing:-.02em;
  }
  .free-tile .cap-inline{
    font-weight:700;
    font-size:clamp(11px, 1.5vw, 12px);
    color:#34d399;
    opacity:.9;
  }

  /* Arrived toggle + panel */
  .arrived-toggle{
    appearance:none;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding:8px 12px;
    background:linear-gradient(180deg, #141414 0%, #0f0f0f 100%);
    border:1px solid #262626;
    border-radius:10px;
    color:var(--muted);
    font-weight:800;
    font-size:13px;
    cursor:pointer;
    letter-spacing:.02em;
    flex:0 0 auto;
  }
  .arrived-toggle[aria-expanded="true"] .arrived-chev{ transform:rotate(180deg); }
  .arrived-chev{ transition:transform .15s; display:inline-block; }
  .arrived-panel{
    display:flex; flex-direction:column; gap:6px;
    max-height:30vh; overflow-y:auto;
    flex:0 0 auto;
  }

  /* Reserveringen lijst */
  .res-list{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:7px;
    padding:2px;
  }
  .res-row{
    display:grid;
    grid-template-columns:auto 1fr;
    gap:12px;
    padding:8px 12px;
    background:linear-gradient(180deg, #171717 0%, #0f0f0f 100%);
    border:1px solid #262626;
    border-radius:12px;
    transition:all .2s;
    cursor:pointer;
    text-align:left;
    appearance:none;
    color:inherit;
    font:inherit;
    width:100%;
    align-items:center;
  }
  .res-row:active{ transform:scale(.995); }

  .res-row.partial{
    border-color:rgba(245,158,11,.55);

  try{
    const { data, error } = await sb.from('tables_status').select('*');
    if(error){ console.error('fetchAll error', error); return; }
    rows = new Map((data||[]).map(r=>[keyOf(r.zone,r.table_num), r]));
  }catch(e){ console.error('fetchAll exception', e); }
}

async function upsertTable(zone, num, patch){
  const prev = rows.get(keyOf(zone,num)) || { zone, table_num:num };
  const payload = {
    status:null, status_started:null, note:null, num_marked:false,
    ...prev,
    ...patch,
    updated_at: new Date().toISOString()
  };
  // Optimistic local update zodat UI ook zonder netwerk werkt
  rows.set(keyOf(zone,num), payload);
  if(!sb) return payload;
  try{
    const { data, error } = await sb.from('tables_status').upsert(payload).select().single();
    if(error){ console.error('upsert error', error); return payload; }
    rows.set(keyOf(zone,num), data);
    return data;
  }catch(e){ console.error('upsert exception', e); return payload; }
}

/* ===== UI helpers ===== */
function applyStatus(cell, status){
  cell.classList.remove(...Object.values(STATUS_CLASSES));
  if(status){
    cell.classList.add(STATUS_CLASSES[status]);
    cell.setAttribute('data-status', status);
  } else {
    cell.removeAttribute('data-status');
    cell.classList.remove('urgency-warn','urgency-crit','next-up','filter-match');
  }
}
function setNote(cell, txt){ cell.querySelector('.note').textContent = txt || ''; }
function setTimer(cell, txt){ cell.querySelector('.timer').textContent = txt || ''; }
function setNumFlag(cell, flagged){
  cell.querySelector('.num').classList.toggle('num-flagged', !!flagged);
  // visuele aanwijzing in idle-staat
  if(!cell.hasAttribute('data-status')){
    cell.classList.toggle('num-flagged-only', !!flagged);
  } else {
    cell.classList.remove('num-flagged-only');
  }
}

function fmtElapsed(ms){
  const total = Math.max(0, Math.floor(ms/1000));
  const s = total % 60;
  const m = Math.floor(total/60) % 60;
  const h = Math.floor(total/3600);
  const pad = n => n<10 ? '0'+n : ''+n;
  return h ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
}

/* Dynamische gap */
function applyResponsiveGap(){
  const minSide = Math.min(window.innerWidth, window.innerHeight);
  let gap = Math.round(minSide / 95);
  gap = Math.max(5, Math.min(12, gap));
  document.documentElement.style.setProperty('--gap', gap + 'px');
}

/* Tiles maximaal uitsmeren */
function layoutToFit(){
  const gap = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap')) || 8;

  const avail = groupsEl.getBoundingClientRect();
  const availW = Math.floor(avail.width);
  const availH = Math.floor(avail.height);

  const labels = groupsEl.querySelectorAll('.group-label');
  let labelH = 0;
  labels.forEach(l=> labelH += Math.ceil(l.getBoundingClientRect().height));

  const betweenGroups = 8;
  const N_b = expandRanges(RANGES_BENEDEN).length;
  const N_t = expandRanges(RANGES_BOVEN).length;

  let best = null;

  for(let cb=1; cb<=N_b; cb++){
    const rb = Math.ceil(N_b / cb);
    const tileW_b = Math.floor((availW - (cb-1)*gap) / cb);

    for(let ct=1; ct<=N_t; ct++){
      const rt = Math.ceil(N_t / ct);
      const tileW_t = Math.floor((availW - (ct-1)*gap) / ct);

      const totalRows = rb + rt;
      const gapsV = (rb-1 + rt-1) * gap + betweenGroups;

      const tileH_limit = Math.floor((availH - labelH - gapsV) / totalRows);
      const tileW_limit = Math.min(tileW_b, tileW_t);
      const tile = Math.max(0, Math.min(tileH_limit, tileW_limit));

      if(!best || tile > best.tile){ best = { cb, ct, rb, rt, tile }; }
    }
  }

  if(!best || best.tile < 28){
    best = { cb:6, ct:10, rb:Math.ceil(N_b/6), rt:Math.ceil(N_t/10), tile:28 };
  }

  document.documentElement.style.setProperty('--tile', best.tile + 'px');

  document.querySelectorAll('.group-grid').forEach(grid=>{
    const zone = grid.dataset.zone;
    grid.style.setProperty('--cols', (zone === 'bt') ? best.cb : best.ct);
  });

  const benedenGroup = document.querySelector('.group[data-zone="bt"]');
  const bovenGroup   = document.querySelector('.group[data-zone="boven"]');
  if(benedenGroup) benedenGroup.style.flex = `${best.rb} 1 0%`;
  if(bovenGroup)   bovenGroup.style.flex   = `${best.rt} 1 0%`;
}

/* ===== Render ===== */
function render(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  groupsEl.innerHTML = '';

  for(const group of GROUPS){
    const nums = expandRanges(group.ranges);

    const wrap = document.createElement('section');
    wrap.className = 'group';
    wrap.dataset.zone = group.zone;

    const label = document.createElement('div');
    label.className = 'group-label';
    label.textContent = group.label;

    const grid = document.createElement('div');
    grid.className = 'group-grid';
    grid.dataset.zone = group.zone;

    wrap.appendChild(label);
    wrap.appendChild(grid);
    groupsEl.appendChild(wrap);

    for(const n of nums){
      const r = rows.get(keyOf(group.zone,n)) || {};

      const cell = document.createElement('button');
      cell.type = 'button';
      cell.className = 'table';
      cell.dataset.zone = group.zone;
      cell.dataset.num = n;

      cell.innerHTML = `
        <div class="num">${n}</div>
        <div class="note"></div>
        <div class="timer"></div>
      `;

      applyStatus(cell, r.status || null);
      setNote(cell, r.note || '');
      setNumFlag(cell, !!r.num_marked);

      cell.addEventListener('click', async ()=>{
        const cur = rows.get(keyOf(group.zone,n)) || {};
        const hasStatus = !!cur.status || cell.hasAttribute('data-status');

        // 1 klik op gekleurde tafel = status wissen (num_marked blijft)
        if(hasStatus){
          haptic(12);
          const keepFlag = !!cur.num_marked;
          await upsertTable(group.zone, n, { status:null, status_started:null, num_marked: keepFlag });
          applyStatus(cell, null);
          setTimer(cell, '');
          setNumFlag(cell, keepFlag);
          refreshDerived();
          return;
        }

        haptic(10);
        pendingCell = cell;
        modalTableNum.textContent = n;
        noteInput.value = cur.note || '';
        showChoicesPane();
        overlay.classList.add('open');
      });

      grid.appendChild(cell);
    }
  }

  function tick(){
    const now = Date.now();
    document.querySelectorAll('.table').forEach(cell=>{
      const zone = cell.dataset.zone;
      const num = Number(cell.dataset.num);
      const r = rows.get(keyOf(zone,num));
      if(r && r.status && r.status_started){
        const ms = now - Date.parse(r.status_started);
        setTimer(cell, fmtElapsed(ms));
        updateUrgency(cell, r.status, Math.floor(ms/1000));
      } else {
        setTimer(cell, '');
      }
    });
    updateNextUp();
  }
  tick();
  timerInterval = setInterval(tick, 1000);

  applyResponsiveGap();
  layoutToFit();
  refreshDerived();
}

/* ===== Urgency ===== */
function updateUrgency(cell, status, elapsedSec){
  const thr = URGENCY[status];
  if(!thr){ cell.classList.remove('urgency-warn','urgency-crit'); return; }
  const [warn, crit] = thr;
  let level = 0;
  if(elapsedSec >= crit) level = 2;
  else if(elapsedSec >= warn) level = 1;

  cell.classList.toggle('urgency-warn', level===1);
  cell.classList.toggle('urgency-crit', level===2);

  // subtiele ding bij overgang naar critical
  const k = `${cell.dataset.zone}-${cell.dataset.num}`;
  const prev = prevUrgencyLevel.get(k) || 0;
  if(level === 2 && prev < 2){
    soundUrgent();
    haptic(30);
  }
  prevUrgencyLevel.set(k, level);
}

/* ===== Next-up: per status de langst wachtende krijgt een ring ===== */
function updateNextUp(){
  document.querySelectorAll('.table.next-up').forEach(c=> c.classList.remove('next-up'));

  const oldestPerStatus = {}; // status -> {key, started}
  for(const [k, r] of rows.entries()){
    if(!r.status || !r.status_started) continue;
    const t = Date.parse(r.status_started);
    if(!oldestPerStatus[r.status] || t < oldestPerStatus[r.status].started){
      oldestPerStatus[r.status] = { key:k, started:t, zone:r.zone, num:r.table_num };
    }
  }

  // Alleen ring tonen als er minstens 2 van die status zijn
  const countsByStatus = countsByStatusNow();
  for(const status in oldestPerStatus){
    if((countsByStatus[status]||0) < 2) continue;
    const o = oldestPerStatus[status];
    const cell = document.querySelector(`.table[data-zone="${o.zone}"][data-num="${o.num}"]`);
    if(cell) cell.classList.add('next-up');
  }
}

function countsByStatusNow(){
  const c = { nieuw:0, drank:0, run:0, koffie:0, rekening:0 };
  for(const r of rows.values()){
    if(r.status && c.hasOwnProperty(r.status)) c[r.status]++;
  }
  return c;
}

/* ===== Status counter bar ===== */
function updateStatusCounts(){
  const c = countsByStatusNow();
  statusBarEl.querySelectorAll('.pill').forEach(pill=>{
    const s = pill.dataset.filter;
    const val = c[s] || 0;
    pill.querySelector(`[data-count="${s}"]`).textContent = val;
    pill.setAttribute('data-zero', val === 0 ? 'true' : 'false');
    pill.setAttribute('data-active', activeFilter === s ? 'true' : 'false');
  });
}

/* Filter toepassen op cellen */
function applyFilterClasses(){
  document.body.classList.toggle('has-filter', !!activeFilter);
  document.querySelectorAll('.table').forEach(cell=>{
    const match = activeFilter && cell.getAttribute('data-status') === activeFilter;
    cell.classList.toggle('filter-match', !!match);
  });
}

function refreshDerived(){
  updateStatusCounts();
  applyFilterClasses();
  updateNextUp();
  if(currentView === 'reservations') renderReservationsDerived();
}

/* ===== Reservations ===== */
async function fetchReservations(dateStr){
  reservations = [];
  if(!sb) return;
  try{
    const { data, error } = await sb.from('reservations')
      .select('*')
      .eq('res_date', dateStr)
      .order('res_time', { ascending:true, nullsFirst:false });
    if(error){ console.error('fetchReservations', error); return; }
    reservations = data || [];
  }catch(e){ console.error('fetchReservations ex', e); }
}

function getArrivalState(r){
  if(r.arrived) return 'complete';
  if(r.arrived_at) return 'partial';
  return 'pending';
}

async function setArrivalState(res, state){
  const now = new Date().toISOString();
  const prev = getArrivalState(res);
  const patch = state === 'complete' ? { arrived:true,  arrived_at:now }
             : state === 'partial'  ? { arrived:false, arrived_at:now }
             :                         { arrived:false, arrived_at:null };

  if(sb){
    try{
      const { error } = await sb.from('reservations').update({ ...patch, updated_at: now }).eq('id', res.id);
      if(error){ console.error('arrival update', error); return; }
    }catch(e){ console.error('arrival ex', e); return; }
  }
  Object.assign(res, patch);

  // Tafels syncen alleen bij overgang pending <-> (partial/complete)
  const wasActive = prev !== 'pending';
  const isActive  = state !== 'pending';
  if(wasActive !== isActive){
    for(const n of (res.table_nums||[])){
      const z = inferZone(n) || res.zone;
      if(!z) continue;
      if(isActive){
        await upsertTable(z, n, { status:'nieuw', status_started:now, num_marked:true });
      } else {
        await upsertTable(z, n, { status:null, status_started:null, num_marked:false });
      }
      const cell = document.querySelector(`.table[data-zone="${z}"][data-num="${n}"]`);
      if(cell){
        applyStatus(cell, isActive ? 'nieuw' : null);
        setNumFlag(cell, isActive);
        if(!isActive) setTimer(cell, '');
      }
    }
  }

  refreshDerived();
  renderReservationsView();
}

function inferZone(num){
  if(num == null) return null;
  if(num >= 1 && num <= 13) return 'bt';
  if(num >= 20 && num <= 58) return 'boven';
  return null;
}

function makeResRow(r){
  const state = getArrivalState(r);
  const row = document.createElement('button');
  row.type = 'button';
  row.className = 'res-row' + (state === 'complete' ? ' arrived' : state === 'partial' ? ' partial' : '');
  row.dataset.id = r.id;

  const timeTxt  = r.res_time ? r.res_time.slice(0,5) : '—';
  const tablesTxt = (r.table_nums||[]).join(' · ') || '—';
  const partyHtml = r.party_size ? `<span class="res-party">${r.party_size}p</span>` : '';
  const stateChip = state === 'partial'  ? `<span class="res-state-chip partial">Deels</span>`
                 : state === 'complete' ? `<span class="res-state-chip complete">Binnen</span>`
                 : '';

  row.innerHTML = `
    <div class="res-table-badge">
      <span class="rtb-tnum">${escapeHtml(tablesTxt)}</span>
      <span class="rtb-lbl">TAFEL</span>
    </div>
    <div class="res-body">
      <span class="res-time">${timeTxt}</span>
      <span class="res-name">${escapeHtml(r.name || '(onbekend)')}${stateChip}</span>
      ${partyHtml}
      ${r.notes ? `<span class="res-note-inline">${escapeHtml(r.notes)}</span>` : ''}
    </div>
  `;

  row.addEventListener('click', ()=>{
    haptic(10);
    openArriveModal(r);
  });
  return row;
}

function renderResList(){
  resListEl.innerHTML = '';
  arrivedPanelEl.innerHTML = '';

  const inProgress = reservations.filter(r => getArrivalState(r) !== 'complete');
  const completed  = reservations.filter(r => getArrivalState(r) === 'complete');

  if(!reservations.length){
    const e = document.createElement('div');
    e.className = 'res-empty';
    e.textContent = sb ? 'Geen reserveringen voor deze dag.' : 'Offline — geen Supabase-verbinding.';
    resListEl.appendChild(e);
    resListSubEl.textContent = '0';
  } else if(!inProgress.length){
    const e = document.createElement('div');
    e.className = 'res-empty';
    e.textContent = 'Alle reserveringen zijn binnen.';
    resListEl.appendChild(e);
    resListSubEl.textContent = '0';
  } else {
    for(const r of inProgress) resListEl.appendChild(makeResRow(r));
    resListSubEl.textContent = `${inProgress.length}`;
  }

  for(const r of completed) arrivedPanelEl.appendChild(makeResRow(r));
  arrivedToggleLblEl.textContent = `Al binnen: ${completed.length}`;
  arrivedToggleEl.style.display = completed.length ? '' : 'none';
}

function openArriveModal(r){

  const partyTxt = r.party_size ? ` — ${r.party_size}p` : '';
  arriveTitleEl.textContent = `T ${tablesTxt}  ·  ${r.name || '(onbekend)'}${partyTxt}`;
  const timeTxt = r.res_time ? r.res_time.slice(0,5) : '';

  arriveCompleteEl.classList.toggle('focus-on', state === 'complete');
  arriveUndoEl.style.display = state === 'pending' ? 'none' : '';

  arriveOverlayEl.classList.add('open');
}
function closeArriveModal(){
  arriveOverlayEl.classList.remove('open');
  arrivingRes = null;
}

});

function renderFreeTables(){
  freeGroupsEl.innerHTML = '';
  const free = [];
  for(const g of GROUPS){
    for(const n of expandRanges(g.ranges)){
      const r = rows.get(keyOf(g.zone, n));
      if(!r || !r.status) free.push({zone:g.zone, num:n, cap: TABLE_CAPACITIES[n] || 0});
    }
  }
  freeSubEl.textContent = `${free.length} tafels`;

  // Groeperen op capaciteit
  const byCap = new Map();
  for(const t of free){
    const key = t.cap || 0;
    if(!byCap.has(key)) byCap.set(key, []);
    byCap.get(key).push(t);
  }
  // Capaciteiten oplopend, onbekende (0) onderaan
  const caps = [...byCap.keys()].sort((a,b)=>{
    if(a === 0) return 1;
    if(b === 0) return -1;
    return a - b;
  });

  for(const cap of caps){
    const tiles = byCap.get(cap).sort((a,b)=> a.num - b.num);

    const row = document.createElement('div');
    row.className = 'fg-row';

    const lbl = document.createElement('div');
    lbl.className = 'fg-label';
    lbl.textContent = cap ? `${cap}p` : '?';

    const wrap = document.createElement('div');
    wrap.className = 'fg-tiles';

    for(const t of tiles){
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'free-tile';
      el.textContent = t.num;
      el.addEventListener('click', async ()=>{
        haptic(15);
        await upsertTable(t.zone, t.num, { status:'nieuw', status_started:new Date().toISOString(), num_marked:true });
        const cell = document.querySelector(`.table[data-zone="${t.zone}"][data-num="${t.num}"]`);
        if(cell){ applyStatus(cell, 'nieuw'); setNumFlag(cell, true); }
        refreshDerived();
      });
      wrap.appendChild(el);
    }

    row.appendChild(lbl);
    row.appendChild(wrap);
    freeGroupsEl.appendChild(row);
  }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ===== Reservations realtime ===== */
function subscribeRealtimeReservations(){
  if(!sb) return;
  if(reservationsChannel) sb.removeChannel(reservationsChannel);
  reservationsChannel = sb.channel('reservations:all')
    .on('postgres_changes', { event:'*', schema:'public', table:'reservations' }, async payload=>{
      const row = payload.new || payload.old;
      if(!row) return;
      if(row.res_date !== currentResDate) return;
      // Simpelste: volledig herladen voor de huidige datum
      await fetchReservations(currentResDate);
      if(currentView === 'reservations') renderReservationsView();
    })
    .subscribe();
}

  overlay.classList.remove('open'); pendingCell=null; showChoicesPane();
});
cancelNoteBtn.addEventListener('click', showChoicesPane);

cancelModalBtn.addEventListener('click', ()=>{ overlay.classList.remove('open'); pendingCell=null; showChoicesPane(); });
overlay.addEventListener('click', (e)=>{ if(e.target===overlay){ overlay.classList.remove('open'); pendingCell=null; showChoicesPane(); }});

/* Reset */
async function fullResetAll(){
  for(const g of GROUPS){
    for(const n of expandRanges(g.ranges)){
      const r = rows.get(keyOf(g.zone,n));
      if(!r) continue;
      await upsertTable(g.zone, n, { status:null, status_started:null, num_marked:false });
    }
  }
  prevUrgencyLevel.clear();
  render();
}
resetAllBtn.addEventListener('click', fullResetAll);

/* Auto reset 02:00 */
async function autoDailyResetCheck(){
  const now = new Date();
  const hh = now.getHours(), mm = now.getMinutes();
  const todayKey = now.toISOString().slice(0,10);
  const last = localStorage.getItem('last_auto_reset');
  if(hh === 2 && mm < 5 && last !== todayKey){
    await fullResetAll();
    localStorage.setItem('last_auto_reset', todayKey);
  }
}
setInterval(autoDailyResetCheck, 60_000);

/* ===== Broadcast ===== */
function hideBroadcastLocal(){
  alertScreenEl.classList.remove('show');
  alertOpen = false;
}
function showBroadcastLocal(message){
  const msg = (message || '').toString().trim();
  if(!msg) return;
  alertTextEl.textContent = msg;
  alertScreenEl.classList.add('show');
  alertOpen = true;
  soundBroadcast();
  haptic([60,60,60]);
}
async function clearBroadcastGlobal(){
  if(!sb) return;
  try{
    const { error } = await sb.from('help_events').insert({ kind: BROADCAST_CLEAR });
    if(error) console.error('broadcast clear insert error', error);
  }catch(e){ console.error('broadcast clear exception', e); }
}
async function sendBroadcast(message){
  const msg = (message || '').toString().trim();
  if(!msg) return;
  if(!sb) return;
  try{
    const { error } = await sb.from('help_events').insert({ kind: msg });
    if(error) console.error('broadcast insert error', error);
  }catch(e){ console.error('broadcast send exception', e); }
}

alertScreenEl.addEventListener('click', async ()=>{
  if(!alertOpen) return;
  hideBroadcastLocal();
  await clearBroadcastGlobal();
});

/* HELP */
helpBtnEl.addEventListener('click', ()=> helpOverlayEl.classList.add('open'));
helpOverlayEl.addEventListener('click', (e)=>{ if(e.target===helpOverlayEl) helpOverlayEl.classList.remove('open'); });
helpCancelEl.addEventListener('click', ()=> helpOverlayEl.classList.remove('open'));
helpOverlayEl.querySelectorAll('[data-broadcast]').forEach(btn=>{
  btn.addEventListener('click', async ()=>{
    const msg = btn.dataset.broadcast;
    helpOverlayEl.classList.remove('open');
    await sendBroadcast(msg);
    showBroadcastLocal(msg);
  });
});

/* TEXT */
textBtnEl.addEventListener('click', ()=> textOverlayEl.classList.add('open'));
textOverlayEl.addEventListener('click', (e)=>{ if(e.target===textOverlayEl) textOverlayEl.classList.remove('open'); });
textCancelEl.addEventListener('click', ()=> textOverlayEl.classList.remove('open'));

textOverlayEl.querySelectorAll('[data-text]').forEach(btn=>{
  btn.addEventListener('click', async ()=>{
    const msg = btn.dataset.text;
    textOverlayEl.classList.remove('open');
    await sendBroadcast(msg);
    showBroadcastLocal(msg);
  });
});
openCustomTextEl.addEventListener('click', ()=>{
  textOverlayEl.classList.remove('open');
  customTextInputEl.value = '';
  customTextOverlayEl.classList.add('open');
  setTimeout(()=>customTextInputEl.focus(), 50);
});
customTextCloseEl.addEventListener('click', ()=> customTextOverlayEl.classList.remove('open'));
customTextOverlayEl.addEventListener('click', (e)=>{ if(e.target===customTextOverlayEl) customTextOverlayEl.classList.remove('open'); });

async function sendCustom(){
  const msg = customTextInputEl.value.trim();
  if(!msg) return;
  customTextOverlayEl.classList.remove('open');
  await sendBroadcast(msg);
  showBroadcastLocal(msg);
}
customTextSendEl.addEventListener('click', sendCustom);
customTextInputEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); sendCustom(); }});

/* Realtime */
function subscribeRealtimeTables(){
  if(!sb) return;
  if(tablesChannel) sb.removeChannel(tablesChannel);
  tablesChannel = sb.channel('tables_status:all')
    .on('postgres_changes', { event:'*', schema:'public', table:'tables_status' }, payload=>{
      const row = payload.new || payload.old;
      if(!row) return;
      rows.set(keyOf(row.zone,row.table_num), payload.new || row);

      const cell = document.querySelector(`.table[data-zone="${row.zone}"][data-num="${row.table_num}"]`);
      if(cell){
        const r = rows.get(keyOf(row.zone,row.table_num));
        applyStatus(cell, r.status || null);
        setNote(cell, r.note || '');
        setNumFlag(cell, !!r.num_marked);
        if(!(r && r.status && r.status_started)){
          setTimer(cell, '');
          prevUrgencyLevel.delete(keyOf(row.zone,row.table_num));
        }
      }
      refreshDerived();
    })
    .subscribe();
}

function subscribeBroadcasts(){
  if(!sb) return;
  if(eventsChannel) sb.removeChannel(eventsChannel);
  eventsChannel = sb.channel('help_events:all')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'help_events' }, payload=>{
      const row = payload?.new;
      const kind = row?.kind;
      if(!kind) return;
      if(kind === BROADCAST_CLEAR){ hideBroadcastLocal(); return; }
      showBroadcastLocal(kind);
    })
    .subscribe();
}

/* Resize */
let raf=null;
function scheduleLayout(){
  if(raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(()=>{
    raf=null;
    applyResponsiveGap();
    layoutToFit();
  });
}
window.addEventListener('resize', scheduleLayout);
window.addEventListener('orientationchange', ()=>setTimeout(()=>{ applyResponsiveGap(); layoutToFit(); }, 60));

/* Init */
(async function init(){
  // 1) Altijd eerst de UI neerzetten (ook zonder netwerk / Supabase)
  render();
  setView(currentView);  // activeer opgeslagen view
  applyResponsiveGap();
  layoutToFit();

  // 2) Daarna data ophalen + realtime (best-effort)
  try{
    await Promise.all([
      fetchAll(),
      fetchReservations(currentResDate)
    ]);
    render();                // hertekenen met data als die binnen is
    if(currentView === 'reservations') renderReservationsView();
    subscribeRealtimeTables();
    subscribeBroadcasts();
    subscribeRealtimeReservations();
    autoDailyResetCheck();
  }catch(e){
    console.error('init network phase failed', e);
  }
  applyResponsiveGap();
  layoutToFit();
})();
</script>
