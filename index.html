<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, initial-scale=1" />
  <title>Zusje Roermond Dashboard</title>
  <style>
    :root{
      --bg:#000000;
      --panel:#0d0d0d;
      --panel-2:#141414;
      --line:#222222;
      --text:#ffffff;
      --muted:#9ca3af;
      --ok:#22c55e;
      --pending:#6b7280;
      --alert:#f59e0b;
      --danger:#ef4444;
    }

    html, body {
      height:100%;
      margin:0;
      background:#000;
      overflow:hidden;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
    }

    #dashboard-shell{
      position:fixed;
      inset:0;
      background:var(--bg);
      overflow:hidden;
    }

    .zd-stage{
      position:relative;
      width:100%;
      height:100%;
    }

    .zd-frame{
      position:absolute;
      left:50%;
      top:50%;
      width:1920px;
      height:1080px;
      transform:translate(-50%, -50%) scale(1);
      transform-origin:center center;
      will-change:transform;
    }

    .zd-wrap{
      width:100%;
      height:100%;
      box-sizing:border-box;
      padding:34px 40px 36px;
      background:var(--bg);
      color:var(--text);
      display:flex;
      flex-direction:column;
      gap:30px;
    }

    .zd-top{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:start;
      min-height:180px;
    }

    .zd-date-left{
      align-self:center;
      justify-self:start;
    }

    .zd-title{
      font-size:28px;
      font-weight:800;
      letter-spacing:.04em;
      color:#d1d5db;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .zd-sub{
      font-size:22px;
      color:var(--muted);
      font-weight:600;
    }

    .zd-center-clock{
      text-align:center;
      align-self:start;
      justify-self:center;
    }

    .zd-clock{
      font-size:124px;
      line-height:.95;
      font-weight:900;
      letter-spacing:-0.04em;
      font-variant-numeric:tabular-nums;
      color:#fff;
    }

    .zd-date{
      margin-top:10px;
      font-size:28px;
      color:#d1d5db;
      font-weight:700;
      text-transform:capitalize;
    }

    .zd-top-right{
      justify-self:end;
      align-self:center;
      text-align:right;
      color:var(--muted);
      font-size:22px;
      font-weight:600;
    }

    .zd-main{
      display:grid;
      grid-template-columns: 1.15fr 1.7fr 1.15fr;
      gap:28px;
      flex:1;
      min-height:0;
    }

    .zd-col{
      display:flex;
      flex-direction:column;
      gap:28px;
      min-height:0;
    }

    .zd-card{
      background:linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--line);
      border-radius:28px;
      padding:24px 24px 22px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      min-height:0;
      box-shadow:0 12px 40px rgba(0,0,0,.35);
    }

    .zd-card-title{
      font-size:30px;
      font-weight:900;
      letter-spacing:.01em;
      color:#fff;
      margin-bottom:18px;
    }

    .zd-list{
      display:flex;
      flex-direction:column;
      gap:14px;
      min-height:0;
      overflow:auto;
    }

    .zd-list::-webkit-scrollbar{
      width:8px;
    }
    .zd-list::-webkit-scrollbar-thumb{
      background:#222;
      border-radius:999px;
    }

    .zd-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:18px 18px;
      border:1px solid #1f1f1f;
      border-radius:18px;
      background:#0a0a0a;
    }

    .zd-item-left{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
      flex:1;
    }

    .zd-dot{
      width:12px;
      height:12px;
      border-radius:999px;
      background:#ffffff;
      flex:0 0 auto;
      opacity:.9;
    }

    .zd-dot.ok{ background:var(--ok); }
    .zd-dot.pending{ background:#6b7280; }
    .zd-dot.alert{ background:var(--alert); }
    .zd-dot.danger{ background:var(--danger); }

    .zd-name{
      font-size:28px;
      font-weight:800;
      color:#fff;
      line-height:1.15;
      letter-spacing:.01em;
    }

    .zd-subname{
      margin-top:4px;
      font-size:18px;
      font-weight:600;
      color:var(--muted);
    }

    .zd-status{
      flex:0 0 auto;
      font-size:18px;
      font-weight:900;
      border-radius:999px;
      padding:10px 14px;
      border:1px solid #262626;
      white-space:nowrap;
    }

    .zd-status.ok{
      color:#dcfce7;
      background:rgba(34,197,94,.14);
      border-color:rgba(34,197,94,.35);
    }

    .zd-status.pending{
      color:#e5e7eb;
      background:rgba(107,114,128,.14);
      border-color:rgba(107,114,128,.35);
    }

    .zd-status.alert{
      color:#fef3c7;
      background:rgba(245,158,11,.14);
      border-color:rgba(245,158,11,.35);
    }

    .zd-status.danger{
      color:#fee2e2;
      background:rgba(239,68,68,.14);
      border-color:rgba(239,68,68,.35);
    }

    .zd-actions-card{
      height:100%;
      justify-content:flex-start;
    }

    .zd-actions-list{
      display:flex;
      flex-direction:column;
      gap:18px;
      overflow:auto;
      min-height:0;
    }

    .zd-action{
      display:flex;
      align-items:center;
      gap:18px;
      padding:22px 24px;
      border-radius:22px;
      border:1px solid #1d1d1d;
      background:#080808;
    }

    .zd-action .zd-dot{
      width:14px;
      height:14px;
    }

    .zd-action-text{
      font-size:34px;
      font-weight:850;
      line-height:1.15;
      letter-spacing:.01em;
      color:#fff;
    }

    .zd-empty{
      color:var(--muted);
      font-size:30px;
      font-weight:700;
    }

    .zd-note{
      color:var(--muted);
      font-size:18px;
      margin-top:6px;
      font-weight:600;
    }
  </style>
</head>
<body>
  <div id="dashboard-shell">
    <div class="zd-stage">
      <div class="zd-frame" id="zd-frame">
        <div class="zd-wrap">

          <div class="zd-top">
            <div class="zd-date-left">
              <div class="zd-title">Zusje Roermond Dashboard</div>
              <div class="zd-sub">Horecadag t/m 04:00</div>
            </div>

            <div class="zd-center-clock">
              <div class="zd-clock" id="zd-clock">--:--</div>
              <div class="zd-date" id="zd-date">—</div>
            </div>

            <div class="zd-top-right">
              Alleen relevante acties van vandaag
            </div>
          </div>

          <div class="zd-main">
            <!-- Links: Bediening -->
            <div class="zd-col">
              <section class="zd-card">
                <div class="zd-card-title">Bediening</div>
                <div class="zd-list" id="zd-serviceChecklists"></div>
              </section>
            </div>

            <!-- Midden: Acties -->
            <div class="zd-col">
              <section class="zd-card zd-actions-card">
                <div class="zd-actions-list" id="zd-actionsList"></div>
              </section>
            </div>

            <!-- Rechts: Keuken -->
            <div class="zd-col">
              <section class="zd-card">
                <div class="zd-card-title">Keuken</div>
                <div class="zd-list" id="zd-kitchenChecklists"></div>
              </section>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const CONFIG = {
      sheets:{
        checklistsJson:"https://script.google.com/macros/s/AKfycbw_Tn0z0s3AJ7CARzHt9sFy8CGhrCe_HzS9ao0KKDtgzq9TR_H-28WBss316I6PDcr7/exec",
        periodicJson:"https://script.google.com/macros/s/AKfycbxEDSHzBOrrYqkNOCQI6clM6DNuoge55tdATn1XNC63HT7GgPcsZF5AT3dwfaLjEUmV/exec",
        containersJson:"https://script.google.com/macros/s/AKfycbwPQ1WsRqrJmRuYD8bL6kz5H5sSDNcBsIa0z-WW4hain7fkVhM6HIUQI3DHyhpn-C1zHQ/exec"
      },
      refreshMs:15000
    };

    const EMBALLAGE_SCHEDULE = {
      0: ["Bidfood emballage klaarzetten"],
      3: ["Bidfood emballage klaarzetten"],
      5: ["Bidfood emballage klaarzetten"]
    };

    const FALLBACK_CONTAINERS = {
      0: ["Restafval containers klaarzetten"],
      1: ["Glas containers klaarzetten"],
      2: ["Restafval containers klaarzetten"],
      3: [],
      4: ["Papier container klaarzetten"],
      5: [],
      6: []
    };

    const THURSDAY_PLASTIC_LABEL = "Plastic containers klaarzetten";
    const YELLOW_CRATES_START = "2025-11-17";

    const state = {
      checklists: [],
      periodicTasks: [],
      ordersRules: [
        {vendor:"Bidfood",weekdays:[2],deadline:"00:00"},
        {vendor:"Bubbels",weekdays:[3],deadline:"23:00",evenWeeks:true},
        {vendor:"Zusje Kantoor",weekdays:[3],deadline:"23:00",evenWeeks:true},
        {vendor:"Bidfood",weekdays:[4],deadline:"00:00"},
        {vendor:"Bidfood",weekdays:[6],deadline:"00:00"}
      ]
    };

    let containersData = null;

    const $ = sel => document.querySelector(sel);
    const pad = n => String(n).padStart(2,"0");

    const getOpsDate = (d)=>{
      const x = new Date(d || Date.now());
      if (x.getHours() < 4) x.setDate(x.getDate() - 1);
      return x;
    };

    const fmtDutchDate = d => d.toLocaleDateString("nl-NL",{
      weekday:"long",
      day:"2-digit",
      month:"long"
    });

    const weekNumber = d=>{
      const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dn = (t.getUTCDay()+6)%7;
      t.setUTCDate(t.getUTCDate()-dn+3);
      const fT = new Date(Date.UTC(t.getUTCFullYear(),0,4));
      return 1 + Math.round(((t-fT)/86400000 - 3 + ((fT.getUTCDay()+6)%7))/7);
    };

    const isEvenWeek = d => weekNumber(d)%2===0;

    const opsDateStrToday = ()=>{
      const d = getOpsDate(new Date());
      return d.toISOString().slice(0,10);
    };

    const ymdInAmsterdam = (dateLike)=>{
      const tz="Europe/Amsterdam";
      if(!dateLike) return null;
      if(typeof dateLike==="string" && /^\d{4}-\d{2}-\d{2}/.test(dateLike)){
        return dateLike.slice(0,10);
      }
      const d = new Date(dateLike);
      if(isNaN(d)) return null;

      const parts = new Intl.DateTimeFormat("nl-NL",{
        timeZone: tz,
        year:"numeric",
        month:"2-digit",
        day:"2-digit"
      }).formatToParts(d);

      let y,m,da;
      for(const p of parts){
        if(p.type==="year") y=p.value;
        else if(p.type==="month") m=p.value;
        else if(p.type==="day") da=p.value;
      }
      return (y && m && da) ? `${y}-${m}-${da}` : null;
    };

    function normalizeText(str){
      return String(str || "")
        .toLowerCase()
        .replace(/\s+/g," ")
        .trim();
    }

    function classifyChecklist(name){
      const n = normalizeText(name);

      if (
        n.includes("keuken") ||
        n.includes("spoel") ||
        n.includes("bar") ||
        n.includes("kok") ||
        n.includes("sluit keuken") ||
        n.includes("sluitlijst keuken") ||
        n.includes("sluitlijst spoel")
      ){
        return "kitchen";
      }

      if (
        n.includes("open") ||
        n.includes("bediening onder") ||
        n.includes("beneden") ||
        n.includes("bediening boven") ||
        n.includes("boven") ||
        n.includes("run")
      ){
        return "service";
      }

      return "service";
    }

    function displayChecklistName(name){
      const n = normalizeText(name);

      if (n.includes("open")) return "Openen";
      if (n.includes("bediening onder")) return "Bediening onder";
      if (n.includes("bediening boven")) return "Bediening boven";
      if (n === "beneden" || n.includes("sluitlijst beneden")) return "Bediening onder";
      if (n === "boven" || n.includes("sluitlijst boven")) return "Bediening boven";
      if (n.includes("run")) return "Run";
      if (n.includes("sluitlijst keuken")) return "Sluitlijst keuken";
      if (n.includes("sluit keuken")) return "Sluitlijst keuken";
      if (n.includes("sluitlijst spoel")) return "Sluitlijst spoel";
      if (n.includes("spoel")) return "Spoelkeuken";
      if (n.includes("keuken")) return "Keuken";
      if (n.includes("bar beneden")) return "Bar beneden";
      if (n.includes("bar boven")) return "Bar boven";

      return name;
    }

    async function fetchChecklists(){
      try{
        const r = await fetch(CONFIG.sheets.checklistsJson,{cache:"no-store"});
        if(r.ok){
          const j = await r.json();
          if(Array.isArray(j.items)){
            state.checklists = j.items
              .map(it=>({
                name:String(it.name || "").trim(),
                done:!!it.done
              }))
              .filter(x=>x.name);
          }
        }
      }catch(e){
        console.warn("Checklist fetch fail", e);
      }
    }

    async function fetchPeriodic(){
      try{
        const u = CONFIG.sheets.periodicJson;
        const sep = u.includes("?") ? "&" : "?";
        const r = await fetch(u + sep + "tz=Europe/Amsterdam",{cache:"no-store"});
        if(r.ok){
          const j = await r.json();
          let items = (j && j.ok && Array.isArray(j.items)) ? j.items : [];
          const todayStr = opsDateStrToday();

          items = items.filter(ev=>{
            const s = ev.start || ev.startTime || ev.date || ev.dateISO;
            if(!s) return true;
            const evStr = ymdInAmsterdam(s);
            if(!evStr) return false;
            return evStr === todayStr;
          });

          state.periodicTasks = items.map(ev=>({
            title: ev.title,
            allDay: !!ev.allDay,
            start: ev.start || ev.startTime || ev.date || ev.dateISO || null
          }));
        }
      }catch(e){
        console.warn("Periodic fail", e);
      }
    }

    async function fetchContainers(){
      const url = CONFIG.sheets.containersJson;
      if(!url) return null;
      try{
        const sep = url.includes("?") ? "&" : "?";
        const r = await fetch(url + sep + "tz=Europe/Amsterdam",{cache:"no-store"});
        if(!r.ok) throw new Error("HTTP " + r.status);
        return await r.json();
      }catch(e){
        console.warn("Containers endpoint faalde:", e);
        return null;
      }
    }

    async function loadAll(){
      const [a,b,c] = await Promise.allSettled([
        fetchChecklists(),
        fetchPeriodic(),
        fetchContainers()
      ]);
      containersData = (c && c.status==="fulfilled") ? c.value : null;
      renderAll();
    }

    function renderHeader(){
      const now = new Date();
      const ops = getOpsDate(now);
      $("#zd-clock").textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      $("#zd-date").textContent = fmtDutchDate(ops);
    }

    function renderChecklistGroup(targetId, items){
      const wrap = document.getElementById(targetId);
      wrap.innerHTML = "";

      if(!items.length){
        wrap.innerHTML = `
          <div class="zd-item">
            <div class="zd-item-left">
              <span class="zd-dot pending"></span>
              <div>
                <div class="zd-name">Geen checklists gevonden</div>
              </div>
            </div>
          </div>
        `;
        return;
      }

      items.forEach(c=>{
        const el = document.createElement("div");
        el.className = "zd-item";
        el.innerHTML = `
          <div class="zd-item-left">
            <span class="zd-dot ${c.done ? "ok" : "pending"}"></span>
            <div>
              <div class="zd-name">${displayChecklistName(c.name)}</div>
            </div>
          </div>
          <div class="zd-status ${c.done ? "ok" : "pending"}">
            ${c.done ? "Ingediend" : "Nog niet"}
          </div>
        `;
        wrap.appendChild(el);
      });
    }

    function renderChecklists(){
      const service = [];
      const kitchen = [];

      state.checklists.forEach(c=>{
        const type = classifyChecklist(c.name);
        if(type === "kitchen") kitchen.push(c);
        else service.push(c);
      });

      const preferredServiceOrder = ["Openen","Bediening onder","Bediening boven","Run"];
      service.sort((a,b)=>{
        const aa = preferredServiceOrder.indexOf(displayChecklistName(a.name));
        const bb = preferredServiceOrder.indexOf(displayChecklistName(b.name));
        return (aa === -1 ? 999 : aa) - (bb === -1 ? 999 : bb);
      });

      renderChecklistGroup("zd-serviceChecklists", service);
      renderChecklistGroup("zd-kitchenChecklists", kitchen);
    }

    function buildActions(){
      const actions = [];
      const now = new Date();
      const ops = getOpsDate(now);
      const dow = ops.getDay();
      const even = isEvenWeek(ops);
      const todayStr = opsDateStrToday();

      let containers = [];
      if (containersData) {
        if (Array.isArray(containersData.items)) {
          containers = containersData.items
            .filter(it=>{
              const s = it.start || it.startTime || it.date || it.dateISO;
              if(!s) return true;
              const evStr = ymdInAmsterdam(s);
              if(!evStr) return false;
              return evStr === todayStr;
            })
            .map(it=> String(it.title || it.name || "").trim())
            .filter(Boolean);
        } else if (Array.isArray(containersData.containers)) {
          containers = containersData.containers.slice();
        }
      }

      if (containers.length === 0) {
        containers = FALLBACK_CONTAINERS[dow] ? [...FALLBACK_CONTAINERS[dow]] : [];
        if (dow === 4 && even) {
          if(!containers.includes(THURSDAY_PLASTIC_LABEL)) containers.push(THURSDAY_PLASTIC_LABEL);
        }
      }

      containers.forEach(x=>{
        actions.push({
          type:"action",
          label:x
        });
      });

      const emballage = EMBALLAGE_SCHEDULE[dow] ? [...EMBALLAGE_SCHEDULE[dow]] : [];
      if(dow === 1 && isYellowCratesDay(ops)){
        emballage.push("Gele Zusje kratten klaarzetten");
      }

      emballage.forEach(x=>{
        actions.push({
          type:"action",
          label:x
        });
      });

      const todayOrders = state.ordersRules.filter(r =>
        (r.weekdays || []).includes(dow) && (!r.evenWeeks || even)
      );

      if(todayOrders.length){
        todayOrders.forEach(r=>{
          let limit = new Date(ops);
          if(r.deadline === "00:00"){
            limit.setDate(limit.getDate()+1);
            limit.setHours(0,0,0,0);
          }else{
            const [h,m] = (r.deadline || "23:59").split(":").map(Number);
            limit.setHours(h, m || 0, 0, 0);
          }

          const diff = Math.round((limit - now) / 60000);
          let urgency = "normal";
          let label = `${r.vendor} bestellen`;

          if(diff < 0){
            urgency = "danger";
            label = `${r.vendor} bestellen — te laat`;
          }else if(diff <= 60){
            urgency = "alert";
            label = `${r.vendor} bestellen — binnen ${diff} min`;
          }else{
            label = `${r.vendor} bestellen`;
          }

          actions.push({
            type:"order",
            label,
            urgency
          });
        });
      } else {
        actions.push({
          type:"empty-order",
          label:"Geen bestellingen"
        });
      }

      const periodic = state.periodicTasks || [];
      periodic.forEach(x=>{
        actions.push({
          type:"note",
          label:x.title
        });
      });

      return actions;
    }

    function renderActions(){
      const wrap = $("#zd-actionsList");
      wrap.innerHTML = "";

      const actions = buildActions();

      if(!actions.length){
        wrap.innerHTML = `<div class="zd-empty">Geen acties voor vandaag</div>`;
        return;
      }

      actions.forEach(a=>{
        const el = document.createElement("div");
        el.className = "zd-action";

        let dotClass = "pending";
        if(a.type === "order" && a.urgency === "alert") dotClass = "alert";
        if(a.type === "order" && a.urgency === "danger") dotClass = "danger";
        if(a.type === "empty-order") dotClass = "pending";
        if(a.type === "action" || a.type === "note") dotClass = "ok";

        el.innerHTML = `
          <span class="zd-dot ${dotClass}"></span>
          <div class="zd-action-text">${a.label}</div>
        `;
        wrap.appendChild(el);
      });
    }

    function isYellowCratesDay(ops){
      const start = new Date(YELLOW_CRATES_START + "T00:00:00");
      const msPerDay = 24*60*60*1000;
      const opsMid = new Date(ops);
      opsMid.setHours(0,0,0,0);
      const daysDiff = Math.floor((opsMid - start.getTime()) / msPerDay);
      if(daysDiff < 0) return false;
      const weeksDiff = Math.floor(daysDiff / 7);
      return weeksDiff % 2 === 0;
    }

    function renderAll(){
      renderHeader();
      renderChecklists();
      renderActions();
      fitFrame();
    }

    const FRAME_W = 1920;
    const FRAME_H = 1080;
    const SAFE_MARGIN_PX = 8;

    function fitFrame(){
      const shell = document.getElementById("dashboard-shell");
      const frame = document.getElementById("zd-frame");

      const viewW = Math.max(1, window.innerWidth || shell.clientWidth || document.documentElement.clientWidth);
      const viewH = Math.max(1, window.innerHeight || shell.clientHeight || document.documentElement.clientHeight);

      const base = Math.min(
        (viewW - SAFE_MARGIN_PX) / FRAME_W,
        (viewH - SAFE_MARGIN_PX) / FRAME_H
      );

      const EXTRA_SHRINK = 0.99;
      const scale = base * EXTRA_SHRINK;

      frame.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    async function toggleFS(){
      try{
        if(document.fullscreenElement){
          await document.exitFullscreen();
        }else{
          const el = document.getElementById("dashboard-shell");
          if(el.requestFullscreen) await el.requestFullscreen();
          else if(document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
        }
      }catch(_){}
    }

    document.addEventListener("keydown", (e)=>{
      if((e.key || "").toLowerCase() === "f") toggleFS();
    });

    window.addEventListener("resize", fitFrame);
    window.addEventListener("orientationchange", fitFrame);
    document.addEventListener("fullscreenchange", fitFrame);
    document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) fitFrame(); });
    if(document.fonts && document.fonts.ready){
      document.fonts.ready.finally(fitFrame);
    }

    fitFrame();
    renderHeader();
    loadAll();

    setInterval(()=>{ renderHeader(); fitFrame(); },1000);
    setInterval(()=>{ loadAll(); }, CONFIG.refreshMs);
  })();
  </script>
</body>
</html>
